const {useState,useEffect,useRef}=React;

function useTheme(){
  const[dark,setDark]=useState(()=>localStorage.getItem("theme")==="dark");
  useEffect(()=>{
    document.body.className=dark?"dark":"light";
    localStorage.setItem("theme",dark?"dark":"light");
  },[dark]);
  return[dark,setDark];
}

function useStorage(key,def){
  const[v,setV]=useState(def);
  const loaded=useRef(false);
  useEffect(()=>{
    if(!loaded.current){loaded.current=true;try{const s=localStorage.getItem(key);if(s)setV(JSON.parse(s));}catch{}}
  },[key]);
  useEffect(()=>{if(loaded.current)try{localStorage.setItem(key,JSON.stringify(v));}catch{};},[key,v]);
  return[v,setV];
}

const habitDueToday=(h,dateStr)=>{
  const d=new Date(dateStr+"T12:00"),dow=d.getDay();
  if(h.repeat==="daily")return true;
  if(h.repeat==="weekly"){const c=new Date((h.createdAt||dateStr)+"T12:00");return Math.floor((d-c)/86400000)%7===0;}
  if(h.repeat==="custom"&&h.days)return h.days.includes(dow);
  if(h.repeat==="none")return h.date===dateStr;
  return true;
};
const taskDueOn=(t,dateStr)=>{
  if(!t.repeat||t.repeat==="none")return t.date===dateStr;
  const d=new Date(dateStr+"T12:00"),dow=d.getDay();
  if(t.repeat==="daily")return!t.date||dateStr>=t.date;
  if(t.repeat==="weekly"){if(t.date&&dateStr<t.date)return false;const s=new Date((t.date||dateStr)+"T12:00");return Math.floor((d-s)/86400000)%7===0;}
  if(t.repeat==="custom"&&t.days){if(t.date&&dateStr<t.date)return false;return t.days.includes(dow);}
  return false;
};

function useDragList(items,setItems){
  const dragIdx=useRef(null);
  const onDragStart=i=>dragIdx.current=i;
  const onDrop=i=>{
    if(dragIdx.current===null||dragIdx.current===i)return;
    const arr=[...items];const[m]=arr.splice(dragIdx.current,1);arr.splice(i,0,m);
    setItems(arr);dragIdx.current=null;
  };
  return{onDragStart,onDrop};
}

function Confetti({trigger}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!trigger)return;
    const canvas=ref.current;if(!canvas)return;
    const ctx=canvas.getContext("2d");
    canvas.width=canvas.offsetWidth;canvas.height=canvas.offsetHeight;
    const pieces=Array.from({length:20},()=>({
      x:canvas.width*0.3+Math.random()*canvas.width*0.4,y:canvas.height*0.2+Math.random()*canvas.height*0.3,
      r:1.5+Math.random()*2,dx:(Math.random()-0.5)*2,dy:-1-Math.random()*2,alpha:1,gravity:0.05,
      color:["#c9a84c","#b8965a","#d4b896","#a09070","#e8d8b8"][Math.floor(Math.random()*5)]
    }));
    let raf;
    const draw=()=>{ctx.clearRect(0,0,canvas.width,canvas.height);let alive=false;
      pieces.forEach(p=>{p.x+=p.dx;p.y+=p.dy;p.dy+=p.gravity;p.alpha-=0.022;
        if(p.alpha>0){alive=true;ctx.globalAlpha=p.alpha;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();}
      });ctx.globalAlpha=1;
      if(alive)raf=requestAnimationFrame(draw);else ctx.clearRect(0,0,canvas.width,canvas.height);
    };draw();return()=>cancelAnimationFrame(raf);
  },[trigger]);
  return React.createElement('canvas',{ref,style:{position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none",borderRadius:"inherit",zIndex:10}});
}

function DayDetail({date,onClose,C,dark}){
  const[tasks,setTasks]=useStorage("tasks",[]);
  const[habits,setHabits]=useStorage("habits",[]);
  const[challenges,setChallenges]=useStorage("challenges",[]);
  const[showAddTask,setShowAddTask]=useState(false);
  const[confetti,setConfetti]=useState(0);
  const d=new Date(date+"T12:00");
  const key=`${d.getMonth()+1}-${d.getDate()}`;
  const label=`${SK_DAYS_LONG[d.getDay()]} ${d.getDate()}. ${SK_MONTHS[d.getMonth()]} ${d.getFullYear()}`;
  const holiday=SK_HOLIDAYS[key]||"";
  const nameDay=SK_NAMES[key]||"";
  const dayTasks=tasks.filter(t=>taskDueOn(t,date));
  const dayHabits=habits.filter(h=>habitDueToday(h,date));
  const weekStart=(()=>{const dd=new Date(date+"T12:00");dd.setDate(dd.getDate()-monOffset(dd.getDay()));return toISO(dd);})();
  const dayChallenges=challenges.filter(c=>c.week===weekStart);
  const isTaskDone=t=>t.repeat&&t.repeat!=="none"?!!(t.doneMap&&t.doneMap[date]):t.done;
  const toggleTask=id=>{setTasks(ts=>ts.map(t=>{if(t.id!==id)return t;if(t.repeat&&t.repeat!=="none"){const doneMap={...(t.doneMap||{})};doneMap[date]=!doneMap[date];return{...t,doneMap};}return{...t,done:!t.done};}));setConfetti(x=>x+1);};
  const toggleHabit=id=>{setHabits(hs=>hs.map(h=>{if(h.id!==id)return h;const checks={...(h.checks||{})};checks[date]=!checks[date];let streak=0,dd=new Date();while(true){const k=toISO(dd);if(checks[k]){streak++;dd.setDate(dd.getDate()-1);}else break;}return{...h,checks,streak};}));setConfetti(x=>x+1);};
  const toggleChallenge=id=>{setChallenges(cs=>cs.map(c=>c.id===id?{...c,done:!c.done}:c));setConfetti(x=>x+1);};
  const addTask=f=>{setTasks(t=>[...t,{id:Date.now(),...f,text:f.text.trim(),done:false,doneMap:{}}]);setShowAddTask(false);};
  const doneAll=dayTasks.filter(t=>isTaskDone(t)).length+dayHabits.filter(h=>h.checks&&h.checks[date]).length+dayChallenges.filter(c=>c.done).length;
  const totalAll=dayTasks.length+dayHabits.length+dayChallenges.length;
  const pct=totalAll?Math.round((doneAll/totalAll)*100):0;
  return(
    <Modal title={label} onClose={onClose} C={C}>
      <div style={{position:"relative"}}>
        <Confetti trigger={confetti}/>
        {(holiday||nameDay)&&<div style={{background:C.accentLight,borderRadius:10,padding:"8px 12px",marginBottom:14,fontSize:12,color:C.accent}}>{holiday&&<div>Sviatok: <b>{holiday}</b></div>}{nameDay&&<div>Meniny: <b style={{color:C.gold}}>{nameDay}</b></div>}</div>}
        {totalAll>0&&<div style={{marginBottom:16,display:"flex",alignItems:"center",gap:10}}><Bar pct={pct} color={C.gold} C={C}/><span style={{fontWeight:700,fontSize:13,color:C.gold,minWidth:36}}>{pct}%</span></div>}
        {dayTasks.length>0&&<SectionCard title="Úlohy" C={C}>{dayTasks.map((t,i)=>{const tc=getTC(t.colorId,dark);const done=isTaskDone(t);return<CheckRow key={t.id} done={done} onToggle={()=>toggleTask(t.id)} label={t.text} sublabel={(t.timeFrom||t.timeTo)?`${t.timeFrom||""}${t.timeTo?" – "+t.timeTo:""}`:undefined} colorDot={tc.color} bg={done?tc.bg:C.itemBg} sepLine={i<dayTasks.length-1?C.sepLine:"transparent"} text={C.text} muted={C.muted}/>;})}</SectionCard>}
        {showAddTask?<TaskForm onSave={addTask} onCancel={()=>setShowAddTask(false)} C={C} dark={dark}/>:<button onClick={()=>setShowAddTask(true)} style={{width:"100%",background:"transparent",border:`1px dashed ${C.border}`,borderRadius:10,padding:"8px",cursor:"pointer",color:C.gold,fontSize:12,fontWeight:600,marginBottom:12}}>+ Pridať úlohu</button>}
        {dayHabits.length>0&&<SectionCard title="Návyky" C={C}>{dayHabits.map((h,i)=>{const done=!!(h.checks&&h.checks[date]);return<CheckRow key={h.id} done={done} onToggle={()=>toggleHabit(h.id)} label={h.name} bg={done?C.accentLight:C.itemBg} sepLine={i<dayHabits.length-1?C.sepLine:"transparent"} text={C.text} muted={C.muted}/>;})}</SectionCard>}
        {dayChallenges.length>0&&<SectionCard title="Výzvy" C={C}>{dayChallenges.map((c,i)=>{const done=c.done;return<CheckRow key={c.id} done={done} onToggle={()=>toggleChallenge(c.id)} label={c.text} bg={done?C.lavLight:C.itemBg} sepLine={i<dayChallenges.length-1?C.sepLine:"transparent"} text={C.text} muted={C.muted}/>;})}</SectionCard>}
      </div>
    </Modal>
  );
}

function Calendar({C,dark}){
  const now=new Date();
  const[view,setView]=useState({y:now.getFullYear(),m:now.getMonth()});
  const[sel,setSel]=useState(null);
  const[tasks]=useStorage("tasks",[]);
  const firstDow=new Date(view.y,view.m,1).getDay();
  const offset=monOffset(firstDow);
  const dim=new Date(view.y,view.m+1,0).getDate();
  const cells=[...Array(offset).fill(null),...Array.from({length:dim},(_,i)=>i+1)];
  const ds=d=>`${view.y}-${String(view.m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  const isToday=d=>d===now.getDate()&&view.m===now.getMonth()&&view.y===now.getFullYear();
  const getTasksForDay=d=>tasks.filter(t=>taskDueOn(t,ds(d)));
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <button onClick={()=>setView(v=>{const d=new Date(v.y,v.m-1,1);return{y:d.getFullYear(),m:d.getMonth()};})} style={{background:C.accentLight,border:"none",borderRadius:10,width:34,height:34,cursor:"pointer",fontSize:16,color:C.gold}}>‹</button>
        <span style={{fontWeight:700,fontSize:14,color:C.gold,letterSpacing:1}}>{SK_MONTHS[view.m]} {view.y}</span>
        <button onClick={()=>setView(v=>{const d=new Date(v.y,v.m+1,1);return{y:d.getFullYear(),m:d.getMonth()};})} style={{background:C.accentLight,border:"none",borderRadius:10,width:34,height:34,cursor:"pointer",fontSize:16,color:C.gold}}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
        {SK_DAYS_SHORT.map((d,i)=><div key={i} style={{textAlign:"center",fontSize:9,fontWeight:700,color:i>=5?C.gold:C.muted,padding:"2px 0",letterSpacing:0.5}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
        {cells.map((d,i)=>{
          if(!d)return<div key={i}/>;
          const tod=isToday(d),hol=SK_HOLIDAYS[`${view.m+1}-${d}`];
          const dayTasks=getTasksForDay(d);
          return(
            <div key={i} onClick={()=>setSel(ds(d))} style={{borderRadius:8,padding:"4px 3px 5px",cursor:"pointer",background:tod?"#c9a84c":hol?C.accentLight:"transparent",color:tod?"#1a1208":hol?C.gold:C.text,minHeight:52,transition:"background .15s"}}>
              <div style={{textAlign:"center",fontSize:12,fontWeight:tod?700:400,marginBottom:2}}>{d}</div>
              <div style={{display:"flex",flexDirection:"column",gap:1,paddingLeft:1,paddingRight:1}}>
                {dayTasks.slice(0,2).map(t=>{const tc=getTC(t.colorId,dark);return<div key={t.id} style={{fontSize:8,background:tod?"rgba(255,255,255,0.25)":tc.bg,color:tod?"#1a1208":tc.color,borderRadius:3,padding:"1px 3px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",fontWeight:600,lineHeight:1.4}}>{t.text}</div>;})}
                {dayTasks.length>2&&<div style={{fontSize:8,color:tod?"rgba(255,255,255,0.7)":C.muted,paddingLeft:2}}>+{dayTasks.length-2}</div>}
              </div>
            </div>
          );
        })}
      </div>
      {sel&&sel!==todayStr()&&<DayDetail date={sel} onClose={()=>setSel(null)} C={C} dark={dark}/>}
    </div>
  );
}

          <div key={h.id} draggable onDragStart={()=>onDragStart(i)} onDragOver={e=>{e.preventDefault();e.currentTarget.classList.add("drag-over");}} onDragLeave={e=>e.currentTarget.classList.remove("drag-over")} onDrop={e=>{e.currentTarget.classList.remove("drag-over");onDrop(i);}}
            style={{background:C.card,borderRadius:14,border:`1px solid ${C.border}`,marginBottom:8,overflow:"hidden",opacity:due?1:.55,cursor:"grab"}}>
            {editing===h.id?<div style={{padding:12}}>
              <input value={editForm.name||h.name} onChange={e=>setEditForm(f=>({...f,name:e.target.value}))} style={{...si,marginBottom:8}}/>
              <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap"}}>{Object.entries(REPEAT_LABELS).filter(([k])=>k!=="none").map(([k,v])=><button key={k} onClick={()=>setEditForm(f=>({...f,repeat:k}))} style={{padding:"4px 10px",borderRadius:999,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:(editForm.repeat||h.repeat)===k?"#c9a84c":C.card,color:(editForm.repeat||h.repeat)===k?"#1a1208":C.muted}}>{v}</button>)}</div>
              <div style={{display:"flex",gap:8}}><button onClick={()=>saveEdit(h.id)} style={{flex:1,background:"#c9a84c",border:"none",borderRadius:10,padding:"8px",color:"#1a1208",fontWeight:700,cursor:"pointer"}}>Uložiť</button><button onClick={()=>setEditing(null)} style={{background:C.border,border:"none",borderRadius:10,padding:"8px 12px",cursor:"pointer",color:C.muted,fontWeight:600}}>Zrušiť</button></div>
            </div>:<>
              <div style={{display:"flex",alignItems:"center",gap:0,borderBottom:`1px solid ${C.sepLine}`}}>
                <div style={{padding:"11px 8px",color:C.border,userSelect:"none",fontSize:16}}>⠿</div>
                <div onClick={()=>due&&toggle(h.id)} style={{width:22,height:22,borderRadius:6,border:`1.5px solid ${done?"#c9a84c":C.border}`,background:done?"#c9a84c":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,cursor:due?"pointer":"default",margin:"11px 0"}}>
                  {done&&<svg width="11" height="8" viewBox="0 0 11 8" fill="none"><polyline points="1,4 4,7 10,1" stroke="#1a1208" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                </div>
                <div style={{flex:1,padding:"11px 14px 11px 10px",cursor:"pointer"}} onClick={()=>{setEditing(h.id);setEditForm({name:h.name,repeat:h.repeat,days:h.days});}}>
                  <div style={{fontSize:13,fontWeight:500,color:done?C.muted:C.text,textDecoration:done?"line-through":"none"}}>{h.name}</div>
                  <div style={{fontSize:10,color:C.muted}}>{REPEAT_LABELS[h.repeat]}{h.repeat==="custom"&&h.days?.length?" · "+h.days.map(d=>DOW_LABELS[d]).join(", "):""}</div>
                </div>
                <div style={{background:C.accentLight,borderRadius:999,padding:"2px 10px",fontSize:11,color:C.gold,fontWeight:700,margin:"0 12px",whiteSpace:"nowrap"}}>{h.streak||0} 🔥</div>
                <button onClick={()=>del(h.id)} style={{background:"none",border:"none",cursor:"pointer",color:C.border,fontSize:14,padding:"11px 12px"}}>✕</button>
              </div>
              <div style={{padding:"10px 14px"}}>
                <div style={{fontSize:9,color:C.muted,marginBottom:5,letterSpacing:0.5}}>{SK_MONTHS[now.getMonth()]} · {doneCnt}/{dim}</div>
                <div style={{display:"flex",gap:2,flexWrap:"wrap"}}>
                  {monthDays.map((day,idx)=>{
                    const isDue=habitDueToday(h,day);
                    const isDone=!!(h.checks&&h.checks[day]);
                    const isFuture=day>tod;
                    return<div key={idx} style={{width:13,height:13,borderRadius:3,background:isDone?"#c9a84c":isDue&&!isFuture?C.accentLight:C.bg,border:`1px solid ${isDue?C.border:"transparent"}`,opacity:isFuture?0.3:1}}/>;
                  })}
                </div>
              </div>
            </>}
          </div>
        );
      })}
    </div>
  );
}

function Challenges({C,dark}){
  const[challenges,setChallenges]=useStorage("challenges",[]);

  const[which,setWhich]=useState("current");
  const[editing,setEditing]=useState(null);
  const[editText,setEditText]=useState("");

  const getWeek=offset=>{const d=new Date();d.setDate(d.getDate()-monOffset(d.getDay())+offset*7);return toISO(d);};

  const current=challenges.filter(c=>c.week===currentWeek);
  const next=challenges.filter(c=>c.week===nextWeek);
  const past=challenges.filter(c=>c.week!==currentWeek&&c.week!==nextWeek);
  const pct=current.length?Math.round((current.filter(c=>c.done).length/current.length)*100):0;
  const add=()=>{if(!text.trim())return;setChallenges(c=>[...c,{id:Date.now(),text:text.trim(),week:targetWeek,done:false}]);setText("");};
  const toggle=id=>{setChallenges(cs=>cs.map(c=>c.id===id?{...c,done:!c.done}:c));setConfetti(x=>x+1);};

      {which==="current"&&<>
        {current.length>0&&<div style={{marginBottom:12,display:"flex",alignItems:"center",gap:10}}><Bar pct={pct} color={C.gold} C={C}/><span style={{fontWeight:700,color:C.gold,minWidth:36,fontSize:13}}>{pct}%</span></div>}
        {current.length===0&&<div style={{textAlign:"center",color:C.muted,fontSize:12,padding:"8px 0"}}>Žiadne výzvy</div>}
        {current.length>0&&<div style={{background:C.card,borderRadius:14,border:`1px solid ${C.border}`,overflow:"hidden",marginBottom:12}}>
          {current.map((c,i)=>editing===c.id
            ?<div key={c.id} style={{padding:12,display:"flex",gap:8}}><input value={editText} onChange={e=>setEditText(e.target.value)} style={{flex:1,border:`1px solid ${C.border}`,borderRadius:10,padding:"8px 10px",fontSize:13,background:C.card,color:C.text,outline:"none"}}/><button onClick={()=>saveEdit(c.id)} style={{background:"#c9a84c",border:"none",borderRadius:10,padding:"8px 12px",color:"#1a1208",fontWeight:700,cursor:"pointer"}}>✓</button><button onClick={()=>setEditing(null)} style={{background:C.border,border:"none",borderRadius:10,padding:"8px 10px",cursor:"pointer",color:C.muted}}>✕</button></div>
            :<div key={c.id} draggable onDragStart={()=>ods(i)} onDragOver={e=>{e.preventDefault();e.currentTarget.style.background=C.accentLight;}} onDragLeave={e=>e.currentTarget.style.background=""} onDrop={e=>{e.currentTarget.style.background="";odp(i);}}
              style={{display:"flex",alignItems:"center",borderBottom:i<current.length-1?`1px solid ${C.sepLine}`:"none",background:c.done?C.lavLight:C.itemBg,cursor:"grab"}}>
              <div style={{padding:"11px 8px",color:C.border,userSelect:"none",fontSize:16}}>⠿</div>
              <div onClick={()=>toggle(c.id)} style={{width:22,height:22,borderRadius:6,border:`1.5px solid ${c.done?"#c9a84c":C.border}`,background:c.done?"#c9a84c":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,cursor:"pointer",margin:"11px 0"}}>
                {c.done&&<svg width="11" height="8" viewBox="0 0 11 8" fill="none"><polyline points="1,4 4,7 10,1" stroke="#1a1208" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>}
              </div>

              <button onClick={()=>del(c.id)} style={{background:"none",border:"none",cursor:"pointer",color:C.border,fontSize:14,padding:"11px 12px"}}>✕</button>
            </div>
          )}

        {next.length===0&&<div style={{textAlign:"center",color:C.muted,fontSize:12,padding:"8px 0"}}>Žiadne plánované výzvy</div>}
        {next.length>0&&<div style={{background:C.card,borderRadius:14,border:`1px solid ${C.border}`,overflow:"hidden",marginBottom:12}}>
          {next.map((c,i)=><div key={c.id} style={{display:"flex",alignItems:"center",padding:"11px 14px",borderBottom:i<next.length-1?`1px solid ${C.sepLine}`:"none",background:C.itemBg}}>
            <div style={{width:22,height:22,borderRadius:6,border:`1.5px solid ${C.border}`,flexShrink:0,opacity:0.4,marginRight:12}}/>
            <span style={{fontSize:13,color:C.muted,flex:1}}>{c.text}</span>
            <button onClick={()=>del(c.id)} style={{background:"none",border:"none",cursor:"pointer",color:C.border,fontSize:14}}>✕</button>
          </div>)}
        </div>}
      </>}
      {past.length>0&&<details style={{marginTop:4}}><summary style={{fontSize:11,color:C.muted,cursor:"pointer"}}>Minulé ({past.length})</summary>
        <div style={{background:C.card,borderRadius:14,border:`1px solid ${C.border}`,overflow:"hidden",opacity:0.45,marginTop:6}}>
          {past.map((c,i)=><div key={c.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 14px",borderBottom:i<past.length-1?`1px solid ${C.sepLine}`:"none",fontSize:12,color:C.muted}}><span>{c.done?"✓":"–"}</span><span style={{textDecoration:c.done?"line-through":"none"}}>{c.text}</span></div>)}
        </div>
      </details>}
    </div>
  );
}

function Weight({C}){
  const[entries,setEntries]=useStorage("weight_entries",[]);
  const[cycleLog,setCycleLog]=useStorage("cycle_log",[]);
  const[form,setForm]=useState({date:todayStr(),weight:"",note:""});
  const[cycleDate,setCycleDate]=useState(todayStr());
  const[showCycleForm,setShowCycleForm]=useState(false);
  const addWeight=()=>{if(!form.weight)return;setEntries(e=>[...e.filter(x=>x.date!==form.date),{date:form.date,weight:parseFloat(form.weight),note:form.note}].sort((a,b)=>a.date.localeCompare(b.date)));setForm({date:todayStr(),weight:"",note:""});};
  const addCycle=()=>{setCycleLog(c=>[...c.filter(x=>x.date!==cycleDate),{date:cycleDate}].sort((a,b)=>a.date.localeCompare(b.date)));setShowCycleForm(false);};
  const delEntry=date=>setEntries(e=>e.filter(x=>x.date!==date));
  const delCycle=date=>setCycleLog(c=>c.filter(x=>x.date!==date));
  const last30=Array.from({length:30},(_,i)=>{const d=new Date();d.setDate(d.getDate()-29+i);return toISO(d);});
  const chartEntries=entries.filter(e=>last30.includes(e.date));
  const minW=chartEntries.length?Math.min(...chartEntries.map(e=>e.weight))-1:50;
  const maxW=chartEntries.length?Math.max(...chartEntries.map(e=>e.weight))+1:100;
  const chartH=110,chartW=300;
  const toX=date=>{const idx=last30.indexOf(date);return idx<0?0:(idx/(last30.length-1))*chartW;};
  const toY=w=>chartH-((w-minW)/(maxW-minW))*chartH;
  const firstEntry=entries[0],lastEntry=entries[entries.length-1];
  const diff=firstEntry&&lastEntry&&entries.length>1?(lastEntry.weight-firstEntry.weight).toFixed(1):null;
  const si={border:`1px solid ${C.border}`,borderRadius:10,padding:"8px 10px",fontSize:13,background:C.card,color:C.text,outline:"none"};

      <div style={{background:C.accentLight,borderRadius:16,padding:14,marginBottom:14}}>
        <div style={{fontSize:9,fontWeight:700,color:C.gold,textTransform:"uppercase",letterSpacing:2,marginBottom:10}}>Zadať hmotnosť</div>
        <div style={{display:"flex",gap:8,marginBottom:8}}><input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} style={{...si,flex:1}}/><input type="number" step="0.1" value={form.weight} onChange={e=>setForm(f=>({...f,weight:e.target.value}))} placeholder="kg" style={{...si,width:70}}/></div>
        <input value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} placeholder="Poznámka" style={{...si,width:"100%",marginBottom:8,boxSizing:"border-box"}}/>
        <button onClick={addWeight} style={{width:"100%",background:"#c9a84c",border:"none",borderRadius:10,padding:"9px",color:"#1a1208",fontWeight:700,fontSize:13,cursor:"pointer"}}>Uložiť</button>
      </div>
      {diff!==null&&<div style={{display:"flex",gap:10,marginBottom:14}}>
        <div style={{flex:1,background:C.accentLight,borderRadius:12,padding:"12px",textAlign:"center"}}><div style={{fontSize:20,fontWeight:700,color:C.gold}}>{diff>0?"+":""}{diff} kg</div><div style={{fontSize:10,color:C.muted}}>celková zmena</div></div>
        {lastEntry&&<div style={{flex:1,background:C.itemBg,borderRadius:12,padding:"12px",textAlign:"center",border:`1px solid ${C.border}`}}><div style={{fontSize:20,fontWeight:700,color:C.accent}}>{lastEntry.weight} kg</div><div style={{fontSize:10,color:C.muted}}>posledný záznam</div></div>}
      </div>}
      {chartEntries.length>1&&<div style={{marginBottom:14}}>
        <div style={{fontSize:10,fontWeight:700,color:C.gold,letterSpacing:1.5,textTransform:"uppercase",marginBottom:8}}>Graf – 30 dní</div>
        <div style={{overflowX:"auto"}}><svg width={chartW} height={chartH+20} style={{display:"block"}}>
          <polyline points={chartEntries.map(e=>`${toX(e.date)},${toY(e.weight)}`).join(" ")} fill="none" stroke="#c9a84c" strokeWidth={1.5} strokeLinecap="round" strokeLinejoin="round"/>
          {chartEntries.map(e=><circle key={e.date} cx={toX(e.date)} cy={toY(e.weight)} r={2.5} fill="#c9a84c"/>)}
          {cycleLog.filter(c=>last30.includes(c.date)).map(c=><line key={c.date} x1={toX(c.date)} y1={0} x2={toX(c.date)} y2={chartH} stroke={C.lav} strokeWidth={1} strokeDasharray="4,3" opacity="0.6"/>)}
        </svg></div>
      </div>}
      <div style={{marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style={{fontSize:10,fontWeight:700,color:C.gold,letterSpacing:1.5,textTransform:"uppercase"}}>Cyklus</div>
          <button onClick={()=>setShowCycleForm(!showCycleForm)} style={{background:C.accentLight,border:"none",borderRadius:8,padding:"4px 10px",cursor:"pointer",color:C.accent,fontSize:11,fontWeight:600}}>+ Zaznačiť</button>
        </div>
        {showCycleForm&&<div style={{display:"flex",gap:8,marginBottom:10}}><input type="date" value={cycleDate} onChange={e=>setCycleDate(e.target.value)} style={{...si,flex:1}}/><button onClick={addCycle} style={{background:"#c9a84c",border:"none",borderRadius:10,padding:"8px 14px",color:"#1a1208",fontWeight:700,cursor:"pointer"}}>✓</button></div>}
        {cycleLog.slice(-5).reverse().map(c=><div key={c.date} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 12px",background:C.itemBg,borderRadius:10,marginBottom:4,fontSize:12,border:`1px solid ${C.border}`}}><span style={{color:C.accent}}>{new Date(c.date+"T12:00").toLocaleDateString("sk-SK",{day:"numeric",month:"long",year:"numeric"})}</span><button onClick={()=>delCycle(c.date)} style={{background:"none",border:"none",cursor:"pointer",color:C.border,fontSize:13}}>✕</button></div>)}
      </div>
      {entries.length>0&&<div>
        <div style={{fontSize:10,fontWeight:700,color:C.gold,letterSpacing:1.5,textTransform:"uppercase",marginBottom:8}}>História</div>
        <div style={{background:C.card,borderRadius:14,border:`1px solid ${C.border}`,overflow:"hidden"}}>
          {entries.slice(-10).reverse().map((e,i,arr)=><div key={e.date} style={{display:"flex",alignItems:"center",padding:"9px 14px",borderBottom:i<arr.length-1?`1px solid ${C.sepLine}`:"none"}}>
            <span style={{fontSize:11,color:C.muted,minWidth:60}}>{new Date(e.date+"T12:00").toLocaleDateString("sk-SK",{day:"numeric",month:"short"})}</span>
            <span style={{fontSize:13,fontWeight:600,color:C.text,flex:1}}>{e.weight} kg</span>
            {e.note&&<span style={{fontSize:10,color:C.muted,marginRight:8}}>{e.note}</span>}
            <button onClick={()=>delEntry(e.date)} style={{background:"none",border:"none",cursor:"pointer",color:C.border,fontSize:13}}>✕</button>
          </div>)}
        </div>
      </div>}
    </div>
  );
}

function Stats({C}){
  const[tasks]=useStorage("tasks",[]);
  const[habits]=useStorage("habits",[]);
  const[challenges]=useStorage("challenges",[]);
  const[weightEntries]=useStorage("weight_entries",[]);
  const tod=todayStr(),now=new Date();
  const getWeek=()=>{const d=new Date(),s=new Date(d);s.setDate(d.getDate()-monOffset(d.getDay()));return toISO(s);};
  const todayH=habits.filter(h=>habitDueToday(h,tod));
  const doneH=todayH.filter(h=>h.checks&&h.checks[tod]).length;
  const doneTasks=tasks.filter(t=>t.repeat&&t.repeat!=="none"?!!(t.doneMap&&t.doneMap[tod]):t.done).length;
  const weekC=challenges.filter(c=>c.week===getWeek());
  const doneWC=weekC.filter(c=>c.done).length;
  const maxStreak=habits.reduce((m,h)=>Math.max(m,h.streak||0),0);
  const best=habits.find(h=>h.streak===maxStreak);
  const monthStart=new Date(now.getFullYear(),now.getMonth(),1);
  const monthDays=Array.from({length:now.getDate()},(_,i)=>toISO(new Date(now.getFullYear(),now.getMonth(),i+1)));
  let habitDaysTotal=0,habitDaysDone=0;
  habits.forEach(h=>{monthDays.forEach(day=>{if(habitDueToday(h,day)){habitDaysTotal++;if(h.checks&&h.checks[day])habitDaysDone++;}});});
  const habitMonthPct=habitDaysTotal?Math.round((habitDaysDone/habitDaysTotal)*100):0;
  const monthTasks=tasks.filter(t=>t.date&&t.date>=toISO(monthStart)&&t.date<=tod);
  const monthTasksDone=monthTasks.filter(t=>t.done||(t.doneMap&&t.doneMap[tod])).length;
  const monthWeeks=[];const cur=new Date(monthStart);cur.setDate(cur.getDate()-monOffset(cur.getDay()));
  while(cur<=now){monthWeeks.push(toISO(new Date(cur)));cur.setDate(cur.getDate()+7);}
  const monthChallenges=challenges.filter(c=>monthWeeks.includes(c.week));
  const monthChallengesDone=monthChallenges.filter(c=>c.done).length;
  const monthWeight=weightEntries.filter(e=>e.date>=toISO(monthStart)&&e.date<=tod);
  const firstW=monthWeight[0],lastW=monthWeight[monthWeight.length-1];
  const weightDiff=firstW&&lastW&&monthWeight.length>1?(lastW.weight-firstW.weight).toFixed(1):null;
  const SL=({c})=><div style={{fontSize:9,fontWeight:700,color:C.gold,textTransform:"uppercase",letterSpacing:2,marginBottom:10,marginTop:20}}>{c}</div>;
  const StatRow=({label,done,total,color})=>(
    <div style={{marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:12,color:C.text}}>{label}</span><span style={{fontSize:12,fontWeight:700,color}}>{done}/{total} · {total?Math.round((done/total)*100):0}%</span></div>
      <Bar pct={total?Math.round((done/total)*100):0} color={color} C={C}/>
    </div>
  );
  return(
    <div>
      <SL c="Dnes"/>
      <StatRow label="Návyky" done={doneH} total={todayH.length||1} color={C.gold}/>
      <StatRow label="Úlohy" done={doneTasks} total={tasks.length||1} color={C.accent}/>
      <StatRow label="Výzvy" done={doneWC} total={weekC.length||1} color={C.lav}/>
      <div style={{background:C.accentLight,borderRadius:14,padding:14,marginTop:14,border:`1px solid ${C.border}`}}>
        <div style={{fontSize:9,color:C.muted,letterSpacing:1.5,textTransform:"uppercase",marginBottom:4}}>Najdlhší streak</div>
        <div style={{fontSize:28,fontWeight:700,color:C.gold}}>{maxStreak} <span style={{fontSize:14,fontWeight:400}}>dní</span></div>
        {best&&<div style={{fontSize:11,color:C.muted,marginTop:2}}>{best.name}</div>}
      </div>
      <SL c={`Zhrnutie – ${SK_MONTHS[now.getMonth()]} ${now.getFullYear()}`}/>
      {habits.length>0&&<div style={{marginBottom:10}}><StatRow label="Návyky" done={habitDaysDone} total={habitDaysTotal||1} color={C.gold}/><div style={{fontSize:10,color:C.muted,marginTop:2}}>{habitMonthPct>=80?"Výborný mesiac.":habitMonthPct>=50?"Dobrý progres.":"Je priestor na zlepšenie."}</div></div>}
      {monthTasks.length>0&&<StatRow label="Úlohy" done={monthTasksDone} total={monthTasks.length} color={C.accent}/>}
      {monthChallenges.length>0&&<StatRow label="Výzvy" done={monthChallengesDone} total={monthChallenges.length} color={C.lav}/>}
      {weightDiff!==null&&<div style={{background:C.accentLight,borderRadius:14,padding:14,marginTop:14,border:`1px solid ${C.border}`}}><div style={{fontSize:9,color:C.muted,letterSpacing:1.5,textTransform:"uppercase",marginBottom:4}}>Forma</div><div style={{fontSize:22,fontWeight:700,color:C.gold}}>{weightDiff>0?"+":""}{weightDiff} kg</div><div style={{fontSize:10,color:C.muted,marginTop:2}}>{firstW.weight} → {lastW.weight} kg</div></div>}
    </div>
  );
}

const TABS=[
  {id:"calendar",label:"Kalendár"},
  {id:"todo",label:"Úlohy"},
  {id:"habits",label:"Návyky"},
  {id:"challenges",label:"Výzvy"},
  {id:"weight",label:"Forma"},
  {id:"stats",label:"Štatistiky"},
];

function App(){
  const[dark,setDark]=useTheme();
  const C=useC(dark);
  const[tab,setTab]=useState("calendar");
  const now=new Date();
  const dateLabel=now.toLocaleDateString("sk-SK",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  const nameKey=`${now.getMonth()+1}-${now.getDate()}`;
  const todayName=SK_NAMES[nameKey];
  const quote=getDailyQuote();
  return(
    <div style={{minHeight:"100vh",background:C.bg,fontFamily:"sans-serif",color:C.text,transition:"background .3s,color .3s"}}>
      <SmokeHeader dateLabel={dateLabel} todayName={todayName} quote={quote} dark={dark} setDark={setDark} C={C}/>
      <div style={{maxWidth:600,margin:"-20px auto 0",padding:"0 clamp(8px,3vw,16px) 40px",position:"relative",zIndex:2}}>
        <div style={{background:C.card,borderRadius:24,boxShadow:dark?"0 4px 40px rgba(0,0,0,.4)":"0 4px 40px rgba(100,70,20,.10)",border:`1px solid ${C.border}`,overflow:"hidden",transition:"background .3s,border .3s"}}>
          <div style={{display:"flex",background:C.smoke,borderBottom:`1px solid ${C.border}`,overflowX:"auto"}}>
            {TABS.map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:"0 0 auto",padding:"13px clamp(6px,2vw,10px)",border:"none",background:"transparent",cursor:"pointer",fontSize:"clamp(8px,2.2vw,10px)",fontWeight:700,color:tab===t.id?C.gold:C.muted,borderBottom:tab===t.id?`2px solid ${C.gold}`:"2px solid transparent",whiteSpace:"nowrap",letterSpacing:0.3,textTransform:"uppercase",transition:"color .2s"}}>
                {t.label}
              </button>
            ))}
          </div>
          <div style={{padding:"clamp(14px,4vw,22px) clamp(12px,4vw,18px)"}}>
            {tab==="calendar"&&<><Calendar C={C} dark={dark}/><TodayPanel C={C} dark={dark}/></>}
            {tab==="todo"&&<Todo C={C} dark={dark}/>}
            {tab==="habits"&&<Habits C={C} dark={dark}/>}
            {tab==="challenges"&&<Challenges C={C} dark={dark}/>}
            {tab==="weight"&&<Weight C={C}/>}
            {tab==="stats"&&<Stats C={C}/>}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
