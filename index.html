// ── IndexedDB ──
const DB_NAME="dashboard_db",DB_VER=1;
function openDB(){return new Promise((res,rej)=>{const req=indexedDB.open(DB_NAME,DB_VER);req.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains("store"))db.createObjectStore("store");};req.onsuccess=e=>res(e.target.result);req.onerror=e=>rej(e.target.error);});}
async function dbGet(key){const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction("store","readonly");const req=tx.objectStore("store").get(key);req.onsuccess=e=>res(e.target.result);req.onerror=e=>rej(e.target.error);});}
async function dbSet(key,val){const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction("store","readwrite");tx.objectStore("store").put(val,key);tx.oncomplete=()=>res();tx.onerror=e=>rej(e.target.error);});}

function useStorage(key,def){
  const[v,setV]=useState(def);
  const loaded=useRef(false);
  useEffect(()=>{if(!loaded.current){loaded.current=true;dbGet(key).then(s=>{if(s!==undefined)setV(s);}).catch(()=>{try{const s=localStorage.getItem(key);if(s)setV(JSON.parse(s));}catch{}});}},[key]);
  const setAndSave=useCallback(valOrFn=>{setV(prev=>{const next=typeof valOrFn==="function"?valOrFn(prev):valOrFn;dbSet(key,next).catch(()=>{try{localStorage.setItem(key,JSON.stringify(next));}catch{}});return next;});},[key]);
  return[v,setAndSave];
}

function useTheme(){
  const[dark,setDark]=useState(()=>localStorage.getItem("theme")==="dark"||(!localStorage.getItem("theme")&&window.matchMedia("(prefers-color-scheme: dark)").matches));
  useEffect(()=>{document.body.className=dark?"dark":"light";localStorage.setItem("theme",dark?"dark":"light");},[dark]);
  return[dark,setDark];
}

const isTaskDoneFn=(t,date)=>t.repeat&&t.repeat!=="none"?!!(t.doneMap&&t.doneMap[date]):t.done;
const habitWeekCount=(h,weekStart)=>{const days=Array.from({length:7},(_,i)=>{const d=new Date(weekStart+"T12:00");d.setDate(d.getDate()+i);return toISO(d);});return days.filter(d=>h.checks&&h.checks[d]).length;};

function useDragList(items,setItems){const dragIdx=useRef(null);const onDragStart=i=>{dragIdx.current=i;};const onDrop=i=>{if(dragIdx.current===null||dragIdx.current===i)return;const arr=[...items];const[m]=arr.splice(dragIdx.current,1);arr.splice(i,0,m);setItems(arr);dragIdx.current=null;};return{onDragStart,onDrop};}

function Bar({pct,color,C,h=5}){return <div style={{background:C.border,borderRadius:999,height:h,overflow:"hidden",flex:1}}><div style={{width:`${Math.min(100,pct)}%`,background:color,height:"100%",borderRadius:999,transition:"width .4s"}}/></div>;}

function Confetti({trigger}){const ref=useRef(null);useEffect(()=>{if(!trigger)return;const canvas=ref.current;if(!canvas)return;const ctx=canvas.getContext("2d");canvas.width=canvas.offsetWidth;canvas.height=canvas.offsetHeight;const pieces=Array.from({length:20},()=>({x:canvas.width*0.3+Math.random()*canvas.width*0.4,y:canvas.height*0.2+Math.random()*canvas.height*0.3,r:1.5+Math.random()*2,dx:(Math.random()-0.5)*2,dy:-1-Math.random()*2,alpha:1,gravity:0.05,color:["#c9a84c","#b8965a","#d4b896","#a09070","#e8d8b8"][Math.floor(Math.random()*5)]}));let raf;const draw=()=>{ctx.clearRect(0,0,canvas.width,canvas.height);let alive=false;pieces.forEach(p=>{p.x+=p.dx;p.y+=p.dy;p.dy+=p.gravity;p.alpha-=0.022;if(p.alpha>0){alive=true;ctx.globalAlpha=p.alpha;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();}});ctx.globalAlpha=1;if(alive)raf=requestAnimationFrame(draw);else ctx.clearRect(0,0,canvas.width,canvas.height);};draw();return()=>cancelAnimationFrame(raf);},[trigger]);return React.createElement('canvas',{ref,style:{position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none",borderRadius:"inherit",zIndex:10}});}
function Modal({title,onClose,children,C}){return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose}><div style={{background:C.card,borderRadius:"24px 24px 0 0",width:"100%",maxWidth:600,maxHeight:"92vh",overflowY:"auto",padding:"24px 20px 32px",border:`1px solid ${C.border}`}} onClick={e=>e.stopPropagation()}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><span style={{fontWeight:700,fontSize:16,color:C.gold}}>{title}</span><button onClick={onClose} style={{background:C.border,border:"none",borderRadius:10,width:30,height:30,cursor:"pointer",fontSize:15,color:C.muted}}>✕</button></div>{children}</div></div>;}

    <div style={{fontSize:10,color:C.muted,marginBottom:6,letterSpacing:1,textTransform:"uppercase"}}>Kategória</div>
    <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>

// ── Monthly summary modal ──
function MonthlySummary({month,year,onClose,C,tasks,habits,challenges,moods,moodLog}){
  const dim=daysInMonth(year,month);
  const monthStart=toISO(new Date(year,month,1));
  const monthEnd=toISO(new Date(year,month,dim));
  const monthDays=Array.from({length:dim},(_,i)=>toISO(new Date(year,month,i+1)));
  // Habits
  let hTotal=0,hDone=0;
  habits.forEach(h=>monthDays.forEach(d=>{hTotal++;if(h.checks&&h.checks[d])hDone++;}));
  // Tasks
  const mTasks=tasks.filter(t=>t.date&&t.date>=monthStart&&t.date<=monthEnd);
  const mTasksDone=mTasks.filter(t=>t.done).length;
  // Challenges
  const monthWeeks=[];const cur=new Date(monthStart);cur.setDate(cur.getDate()-monOffset(cur.getDay()));
  while(toISO(cur)<=monthEnd){monthWeeks.push(toISO(new Date(cur)));cur.setDate(cur.getDate()+7);}
  const mChallenges=challenges.filter(c=>monthWeeks.includes(c.week));
  const mCDone=mChallenges.filter(c=>{const days=Array.from({length:7},(_,i)=>{const d=new Date(c.week+"T12:00");d.setDate(d.getDate()+i);return toISO(d);});return days.filter(d=>c.doneMap&&c.doneMap[d]).length>=(c.target||7);}).length;
  // Mood
  const moodCounts={};moods.forEach(m=>{moodCounts[m.id]=monthDays.filter(d=>moodLog[d]===m.id).length;});
  const topMood=moods.find(m=>moodCounts[m.id]===Math.max(...Object.values(moodCounts)));
  const hPct=hTotal?Math.round(hDone/hTotal*100):0;
  return <Modal title={`Zhrnutie — ${SK_MONTHS[month]} ${year}`} onClose={onClose} C={C}>
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {[["Návyky",hDone,hTotal,C.gold],["Úlohy",mTasksDone,mTasks.length,C.accent],["Výzvy",mCDone,mChallenges.length,C.lav]].map(([l,d,t,col])=>t>0&&(
        <div key={l}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:13,color:C.text,fontWeight:500}}>{l}</span><span style={{fontSize:13,fontWeight:700,color:col}}>{d}/{t} · {t?Math.round(d/t*100):0}%</span></div>
          <Bar pct={t?Math.round(d/t*100):0} color={col} C={C}/>
        </div>
      ))}
      {topMood&&Object.values(moodCounts).some(v=>v>0)&&<div style={{background:C.accentLight,borderRadius:12,padding:"12px 14px",border:`1px solid ${C.border}`}}>
        <div style={{fontSize:9,color:C.muted,letterSpacing:2,textTransform:"uppercase",marginBottom:6}}>Nálada mesiaca</div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:28,height:28,borderRadius:"50%",background:"#c9a84c",opacity:topMood.opacity,flexShrink:0}}/>
          <span style={{fontSize:14,fontWeight:600,color:C.text}}>{topMood.label}</span>
          <span style={{fontSize:11,color:C.muted,marginLeft:"auto"}}>{moodCounts[topMood.id]}× dni</span>
        </div>
      </div>}
      <div style={{background:C.accentLight,borderRadius:12,padding:"12px 14px",border:`1px solid ${C.border}`}}>
        <div style={{fontSize:9,color:C.muted,letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Celkové skóre</div>
        <div style={{fontSize:32,fontWeight:700,color:C.gold,marginBottom:2}}>{hPct}<span style={{fontSize:16,fontWeight:400}}>%</span></div>
        <div style={{fontSize:11,color:C.muted}}>{hPct>=80?"Výborný mesiac! Tak ďalej.":hPct>=60?"Dobrý mesiac, stále je priestor.":"Nevadí, nový mesiac je nová šanca."}</div>
      </div>
    </div>
  </Modal>;
}

function DayDetail({date,onClose,C,moodLog,setMoodLog,moods,journalEntries,setJournalEntries}){
  const[tasks,setTasks]=useStorage("tasks",[]);
  const[habits,setHabits]=useStorage("habits",[]);
  const[challenges,setChallenges]=useStorage("challenges",[]);
  const[showAddTask,setShowAddTask]=useState(false);
  const[confetti,setConfetti]=useState(0);
  const[journalText,setJournalText]=useState(()=>journalEntries[date]||"");
  const d=new Date(date+"T12:00");
  const key=`${d.getMonth()+1}-${d.getDate()}`;
  const label=`${SK_DAYS_LONG[d.getDay()]} ${d.getDate()}. ${SK_MONTHS[d.getMonth()]} ${d.getFullYear()}`;
  const holiday=SK_HOLIDAYS[key]||"",nameDay=SK_NAMES[key]||"";
  const dayTasks=tasks.filter(t=>taskDueOn(t,date));
  const dayHabits=habits.filter(h=>habitDoneOn(h,date)||habitDueToday(h,date));
  const ws=weekMonday(date);
  const dayChallenges=challenges.filter(c=>c.week===ws);
  const currentMood=moodLog[date];
  const toggleTask=id=>{setTasks(ts=>ts.map(t=>{if(t.id!==id)return t;if(t.repeat&&t.repeat!=="none"){const dm={...(t.doneMap||{})};dm[date]=!dm[date];return{...t,doneMap:dm};}return{...t,done:!t.done};}));setConfetti(x=>x+1);};
  const toggleHabit=id=>{setHabits(hs=>hs.map(h=>{if(h.id!==id)return h;const checks={...(h.checks||{})};checks[date]=!checks[date];return{...h,checks};}));setConfetti(x=>x+1);};
  const toggleChallenge=id=>{setChallenges(cs=>cs.map(c=>{if(c.id!==id)return c;const dm={...(c.doneMap||{})};dm[date]=!dm[date];return{...c,doneMap:dm};}));setConfetti(x=>x+1);};
  const addTask=f=>{setTasks(t=>[...t,{id:Date.now(),...f,text:f.text.trim(),done:false,doneMap:{}}]);setShowAddTask(false);};
  const saveJournal=()=>setJournalEntries(e=>({...e,[date]:journalText}));
  return <Modal title={label} onClose={onClose} C={C}>
    <div style={{position:"relative"}}>
      <Confetti trigger={confetti}/>
      {(holiday||nameDay)&&<div style={{background:C.accentLight,borderRadius:10,padding:"8px 12px",marginBottom:14,fontSize:12,color:C.accent}}>{holiday&&<div>Sviatok: <b>{holiday}</b></div>}{nameDay&&<div>Meniny: <b style={{color:C.gold}}>{nameDay}</b></div>}</div>}
      {/* Nálada */}
      <div style={{marginBottom:16}}>
        <div style={{fontSize:9,fontWeight:700,color:C.gold,textTransform:"uppercase",letterSpacing:2,marginBottom:8}}>Nálada</div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {moods.map(m=>(
            <div key={m.id} onClick={()=>setMoodLog(ml=>({...ml,[date]:ml[date]===m.id?null:m.id}))}
              style={{flex:1,height:32,borderRadius:8,background:currentMood===m.id?"#c9a84c":C.accentLight,border:`1.5px solid ${currentMood===m.id?"#c9a84c":C.border}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",opacity:m.opacity+(currentMood===m.id?0:0),transition:"all .15s"}}>
              <div style={{width:10,height:10,borderRadius:"50%",background:currentMood===m.id?"#1a1208":"#c9a84c",opacity:m.opacity}}/>
            </div>
          ))}
        </div>
        {currentMood&&<div style={{fontSize:10,color:C.muted,marginTop:5,textAlign:"center"}}>{moods.find(m=>m.id===currentMood)?.label}</div>}
      </div>
      {/* Úlohy */}
      {dayTasks.length>0&&<SectionCard title="Úlohy" C={C}>{dayTasks.map((t,i)=>{const done=isTaskDoneFn(t,date);return <div key={t.id} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 14px",borderBottom:i<dayTasks.length-1?`1px solid ${C.sepLine}`:"none",cursor:"pointer"}} onClick={()=>toggleTask(t.id)}><CatIcon id={t.colorId} opacity={done?0.4:1}/><CheckBox done={done} onToggle={()=>toggleTask(t.id)} C={C}/><div style={{flex:1}}><div style={{fontSize:13,textDecoration:done?"line-through":"none",color:done?C.muted:C.text}}>{t.text}</div>{(t.timeFrom||t.timeTo)&&<div style={{fontSize:10,color:C.muted}}>{t.timeFrom}{t.timeTo?` – ${t.timeTo}`:""}</div>}</div></div>;})</SectionCard>}
      {showAddTask?<TaskForm onSave={addTask} onCancel={()=>setShowAddTask(false)} C={C}/>:<button onClick={()=>setShowAddTask(true)} style={{width:"100%",background:"transparent",border:`1px dashed ${C.border}`,borderRadius:10,padding:"8px",cursor:"pointer",color:C.gold,fontSize:12,fontWeight:600,marginBottom:12}}>+ Pridať úlohu</button>}
      {/* Návyky */}
      {dayHabits.length>0&&<SectionCard title="Návyky" C={C}>{dayHabits.map((h,i)=>{const done=habitDoneOn(h,date);return <div key={h.id} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 14px",borderBottom:i<dayHabits.length-1?`1px solid ${C.sepLine}`:"none",cursor:"pointer",background:done?C.accentLight:"transparent"}} onClick={()=>toggleHabit(h.id)}><CheckBox done={done} onToggle={()=>toggleHabit(h.id)} C={C}/><span style={{fontSize:13,flex:1,color:done?C.muted:C.text,textDecoration:done?"line-through":"none"}}>{h.name}</span></div>;})</SectionCard>}
      {/* Výzvy */}
      {dayChallenges.length>0&&<SectionCard title="Výzvy" C={C}>{dayChallenges.map((c,i)=>{const done=!!(c.doneMap&&c.doneMap[date]);return <div key={c.id} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 14px",borderBottom:i<dayChallenges.length-1?`1px solid ${C.sepLine}`:"none",cursor:"pointer",background:done?C.lavLight:"transparent"}} onClick={()=>toggleChallenge(c.id)}><CheckBox done={done} onToggle={()=>toggleChallenge(c.id)} C={C}/><span style={{fontSize:13,flex:1,textDecoration:done?"line-through":"none",color:done?C.muted:C.text}}>{c.text}</span></div>;})</SectionCard>}
      {/* Denník */}
      <div style={{marginTop:4}}>
        <div style={{fontSize:9,fontWeight:700,color:C.gold,textTransform:"uppercase",letterSpacing:2,marginBottom:8}}>Zápisník</div>
        <textarea value={journalText} onChange={e=>setJournalText(e.target.value)} onBlur={saveJournal}
          placeholder="Ako bol tento deň? Čo si cítila, čo sa podarilo..."
          style={{width:"100%",minHeight:100,border:`1px solid ${C.border}`,borderRadius:12,padding:"10px 12px",fontSize:13,background:C.card,color:C.text,outline:"none",resize:"vertical",lineHeight:1.6,boxSizing:"border-box"}}/>
        <button onClick={saveJournal} style={{marginTop:6,background:"#c9a84c",border:"none",borderRadius:10,padding:"8px 18px",color:"#1a1208",fontWeight:700,fontSize:13,cursor:"pointer"}}>Uložiť</button>
      </div>
    </div>
  </Modal>;
}

function Calendar({C,moodLog,moods}){
  const now=new Date();
  const[view,setView]=useState({y:now.getFullYear(),m:now.getMonth()});
  const[sel,setSel]=useState(null);
  const[tasks]=useStorage("tasks",[]);
  const[moodLogS,setMoodLogS]=useStorage("mood_log",{});
  const[journalEntries,setJournalEntries]=useStorage("journal",{});
  const[showSummary,setShowSummary]=useState(false);
  const[habits]=useStorage("habits",[]);
  const[challenges]=useStorage("challenges",[]);

  const firstDow=new Date(view.y,view.m,1).getDay();
  const offset=monOffset(firstDow);
  const dim=new Date(view.y,view.m+1,0).getDate();
  const ds=d=>`${view.y}-${String(view.m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  const isToday=d=>d===now.getDate()&&view.m===now.getMonth()&&view.y===now.getFullYear();
  const weeks=[];let dayNum=1-offset;
  while(dayNum<=dim){const wk=[];for(let i=0;i<7;i++){wk.push(dayNum>=1&&dayNum<=dim?dayNum:null);dayNum++;}weeks.push(wk);}

  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <button onClick={()=>setView(v=>{const d=new Date(v.y,v.m-1,1);return{y:d.getFullYear(),m:d.getMonth()};})} style={{background:C.accentLight,border:"none",borderRadius:10,width:34,height:34,cursor:"pointer",fontSize:16,color:C.gold}}>‹</button>
      <button onClick={()=>setShowSummary(true)} style={{background:"transparent",border:"none",cursor:"pointer",fontWeight:700,fontSize:14,color:C.gold,letterSpacing:1}}>{SK_MONTHS[view.m]} {view.y}</button>
      <button onClick={()=>setView(v=>{const d=new Date(v.y,v.m+1,1);return{y:d.getFullYear(),m:d.getMonth()};})} style={{background:C.accentLight,border:"none",borderRadius:10,width:34,height:34,cursor:"pointer",fontSize:16,color:C.gold}}>›</button>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"18px repeat(7,1fr)",gap:2,marginBottom:4}}>
      <div/>{SK_DAYS_SHORT.map((d,i)=><div key={i} style={{textAlign:"center",fontSize:9,fontWeight:700,color:i>=5?C.gold:C.muted,padding:"2px 0"}}>{d}</div>)}
    </div>
    {weeks.map((wk,wi)=>{
      const firstReal=wk.find(d=>d!==null);
      const wkNum=firstReal?getWeekNum(ds(firstReal)):"";
      return <div key={wi} style={{display:"grid",gridTemplateColumns:"18px repeat(7,1fr)",gap:2,marginBottom:2}}>

            {moodObj&&<div style={{width:6,height:6,borderRadius:"50%",background:"#c9a84c",opacity:moodObj.opacity,margin:"0 auto 2px"}}/>}
            {totalCnt>0&&<>

            </>}
          </div>;

    })}

}

  const toggleHabit=id=>{setHabits(hs=>hs.map(h=>{if(h.id!==id)return h;const checks={...(h.checks||{})};checks[tod]=!checks[tod];return{...h,checks};}));setConfetti(x=>x+1);};
  const toggleChallenge=id=>{setChallenges(cs=>cs.map(c=>{if(c.id!==id)return c;const dm={...(c.doneMap||{})};dm[tod]=!dm[tod];return{...c,doneMap:dm};}));setConfetti(x=>x+1);};
  const doneAll=dayTasks.filter(t=>isTaskDoneFn(t,tod)).length+dayHabits.filter(h=>habitDoneOn(h,tod)).length+dayChallenges.filter(c=>c.doneMap&&c.doneMap[tod]).length;

          style={{flex:1,height:26,borderRadius:7,background:currentMood===m.id?"#c9a84c":C.accentLight,border:`1.5px solid ${currentMood===m.id?"#c9a84c":C.border}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .15s"}}>
          <div style={{width:8,height:8,borderRadius:"50%",background:currentMood===m.id?"#1a1208":"#c9a84c",opacity:m.opacity}}/>

    {dayHabits.length>0&&<SectionCard title="Návyky" C={C}>{dayHabits.map((h,i)=>{const done=habitDoneOn(h,tod);return <div key={h.id} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 14px",borderBottom:i<dayHabits.length-1?`1px solid ${C.sepLine}`:"none",cursor:"pointer",background:done?C.accentLight:"transparent"}} onClick={()=>toggleHabit(h.id)}><CheckBox done={done} onToggle={()=>toggleHabit(h.id)} C={C}/><span style={{fontSize:13,flex:1,color:done?C.muted:C.text,textDecoration:done?"line-through":"none"}}>{h.name}</span></div>;})</SectionCard>}
    {dayChallenges.length>0&&<SectionCard title="Výzvy" C={C}>{dayChallenges.map((c,i)=>{const done=!!(c.doneMap&&c.doneMap[tod]);return <div key={c.id} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 14px",borderBottom:i<dayChallenges.length-1?`1px solid ${C.sepLine}`:"none",cursor:"pointer",background:done?C.lavLight:"transparent"}} onClick={()=>toggleChallenge(c.id)}><CheckBox done={done} onToggle={()=>toggleChallenge(c.id)} C={C}/><span style={{fontSize:13,flex:1,textDecoration:done?"line-through":"none",color:done?C.muted:C.text}}>{c.text}</span></div>;})</SectionCard>}
  </div>;
}

function Habits({C}){
  const[habits,setHabits]=useStorage("habits",[]);
  const[showForm,setShowForm]=useState(false);
  const[editing,setEditing]=useState(null);
  const[form,setForm]=useState({name:"",weekTarget:7});
  const[editForm,setEditForm]=useState({});
  const[confetti,setConfetti]=useState(0);
  const[search,setSearch]=useState("");
  const{onDragStart,onDrop}=useDragList(habits,setHabits);
  const tod=todayStr(),now=new Date();
  const ws=weekMonday(tod);
  const dim=daysInMonth(now.getFullYear(),now.getMonth());
  const monthDays=Array.from({length:dim},(_,i)=>toISO(new Date(now.getFullYear(),now.getMonth(),i+1)));
  const toggleHabitDay=(id,day)=>{setHabits(hs=>hs.map(h=>{if(h.id!==id)return h;const checks={...(h.checks||{})};checks[day]=!checks[day];let streak=0;let w=new Date(weekMonday(tod)+"T12:00");while(true){const wStart=toISO(w);const cnt=habitWeekCount({...h,checks},wStart);if(cnt>=(h.weekTarget||7)){streak++;w.setDate(w.getDate()-7);}else break;}return{...h,checks,streak};}));setConfetti(x=>x+1);};
  const add=()=>{if(!form.name.trim())return;setHabits(h=>[...h,{id:Date.now(),name:form.name.trim(),weekTarget:form.weekTarget,checks:{},streak:0,createdAt:tod}]);setForm({name:"",weekTarget:7});setShowForm(false);};
  const saveEdit=id=>{setHabits(hs=>hs.map(h=>h.id===id?{...h,...editForm}:h));setEditing(null);};
  const del=id=>setHabits(h=>h.filter(x=>x.id!==id));
  const todayHabits=habits.filter(h=>habitDueToday(h,tod));
  const doneToday=todayHabits.filter(h=>habitDoneOn(h,tod)).length;
  const pct=todayHabits.length?Math.round((doneToday/todayHabits.length)*100):0;
  const filtered=habits.filter(h=>!search||h.name.toLowerCase().includes(search.toLowerCase()));
  const si={width:"100%",border:`1px solid ${C.border}`,borderRadius:10,padding:"8px 10px",fontSize:13,marginBottom:8,boxSizing:"border-box",background:C.card,color:C.text,outline:"none"};
  return <div style={{position:"relative"}}>
    <Confetti trigger={confetti}/>
    {todayHabits.length>0&&<div style={{marginBottom:14,display:"flex",alignItems:"center",gap:10}}><Bar pct={pct} color={C.gold} C={C}/><span style={{fontWeight:700,color:C.gold,minWidth:36,fontSize:13}}>{pct}%</span></div>}
    <div style={{display:"flex",gap:8,marginBottom:12}}>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Hľadať návyky..." style={{flex:1,border:`1px solid ${C.border}`,borderRadius:10,padding:"8px 12px",fontSize:13,background:C.card,color:C.text,outline:"none"}}/>
      {search&&<button onClick={()=>setSearch("")} style={{background:C.border,border:"none",borderRadius:10,padding:"8px 12px",cursor:"pointer",color:C.muted,fontSize:12}}>✕</button>}
    </div>
    <button onClick={()=>setShowForm(!showForm)} style={{width:"100%",background:C.accentLight,border:`1px dashed ${C.border}`,borderRadius:12,padding:"10px",cursor:"pointer",color:C.gold,fontWeight:600,fontSize:13,marginBottom:14}}>+ Pridať návyk</button>
    {showForm&&<div style={{background:C.accentLight,borderRadius:16,padding:14,marginBottom:14}}>
      <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="Názov návyku (napr. Tréning, Lieky...)" style={si}/>
      <div style={{fontSize:10,color:C.muted,marginBottom:8,letterSpacing:1,textTransform:"uppercase"}}>Cieľ dní za týždeň</div>
      <div style={{display:"flex",gap:6,marginBottom:8}}>
        {[1,2,3,4,5,6,7].map(n=><button key={n} onClick={()=>setForm(f=>({...f,weekTarget:n}))} style={{flex:1,height:36,borderRadius:9,border:"none",cursor:"pointer",fontSize:13,fontWeight:700,background:form.weekTarget===n?"#c9a84c":C.card,color:form.weekTarget===n?"#1a1208":C.muted,transition:"all .15s"}}>{n}</button>)}
      </div>
      <div style={{fontSize:11,color:C.muted,marginBottom:12,textAlign:"center"}}>{form.weekTarget===7?"Každý deň":form.weekTarget===1?"Aspoň raz týždenne":`${form.weekTarget}× za týždeň`}</div>
      <div style={{display:"flex",gap:8}}><button onClick={add} style={{flex:1,background:"#c9a84c",border:"none",borderRadius:10,padding:"9px",color:"#1a1208",fontWeight:700,fontSize:13,cursor:"pointer"}}>Pridať</button><button onClick={()=>setShowForm(false)} style={{background:C.border,border:"none",borderRadius:10,padding:"9px 14px",cursor:"pointer",color:C.muted,fontWeight:600}}>Zrušiť</button></div>
    </div>}
    {filtered.length===0&&<div style={{textAlign:"center",color:C.muted,fontSize:13,padding:"24px 0",fontStyle:"italic"}}>Prvý návyk je najdôležitejší. ✦</div>}
    {filtered.map((h,i)=>{
      const done=habitDoneOn(h,tod);
      const weekDone=habitWeekCount(h,ws);
      const weekTarget=h.weekTarget||7;
      const weekPct=Math.round((weekDone/weekTarget)*100);
      const weekMet=weekDone>=weekTarget;
      const doneCnt=monthDays.filter(d=>h.checks&&h.checks[d]).length;
      return <div key={h.id} draggable onDragStart={()=>onDragStart(i)} onDragOver={e=>{e.preventDefault();e.currentTarget.style.outline=`2px dashed ${C.gold}`;}} onDragLeave={e=>e.currentTarget.style.outline=""} onDrop={e=>{e.currentTarget.style.outline="";onDrop(i);}}
        style={{background:C.card,borderRadius:14,border:`1px solid ${weekMet?C.gold:C.border}`,marginBottom:8,overflow:"hidden",cursor:"grab",transition:"border .3s"}}>
        {editing===h.id?<div style={{padding:12}}>

          <div style={{display:"flex",gap:8}}><button onClick={()=>saveEdit(h.id)} style={{flex:1,background:"#c9a84c",border:"none",borderRadius:10,padding:"8px",color:"#1a1208",fontWeight:700,cursor:"pointer"}}>Uložiť</button><button onClick={()=>setEditing(null)} style={{background:C.border,border:"none",borderRadius:10,padding:"8px 12px",cursor:"pointer",color:C.muted,fontWeight:600}}>Zrušiť</button></div>
        </div>:<>
          <div style={{display:"flex",alignItems:"center",padding:"12px 14px",gap:10}}>
            <div style={{color:C.border,userSelect:"none",fontSize:16,cursor:"grab",flexShrink:0}}>⠿</div>
            <CheckBox done={done} onToggle={()=>toggleHabitDay(h.id,tod)} C={C}/>
            <div style={{flex:1,cursor:"pointer",minWidth:0}} onClick={()=>{setEditing(h.id);setEditForm({name:h.name,weekTarget:h.weekTarget});}}>
              <div style={{fontSize:13,fontWeight:500,color:done?C.muted:C.text,textDecoration:done?"line-through":"none"}}>{h.name}</div>
              <div style={{fontSize:10,color:C.muted}}>{weekTarget===7?"Každý deň":weekTarget===1?"Aspoň raz/týždeň":`${weekTarget}× za týždeň`}</div>
            </div>
            <div style={{background:weekMet?C.accentLight:C.itemBg,borderRadius:8,padding:"3px 10px",fontSize:12,color:weekMet?C.gold:C.muted,fontWeight:700,border:`1px solid ${weekMet?C.gold:C.border}`,whiteSpace:"nowrap",flexShrink:0}}>{weekDone}/{weekTarget}</div>
            <div style={{display:"flex",alignItems:"center",gap:4,background:C.accentLight,borderRadius:8,padding:"3px 8px",border:`1px solid ${C.border}`,flexShrink:0}}><SvgIcon name="star" size={10} color="#c9a84c" fill="#c9a84c"/><span style={{fontSize:11,color:C.gold,fontWeight:700}}>{h.streak||0}</span></div>
            <button onClick={()=>del(h.id)} style={{background:"none",border:"none",cursor:"pointer",color:C.border,fontSize:14,padding:0,flexShrink:0}}>✕</button>
          </div>
          <div style={{padding:"0 14px 8px"}}><Bar pct={weekPct} color={weekMet?"#c9a84c":C.accent} C={C} h={4}/></div>
          <details style={{borderTop:`1px solid ${C.sepLine}`}}>
            <summary style={{cursor:"pointer",padding:"7px 14px",display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:9,color:C.gold}}>▸</span>
              <span style={{fontSize:9,color:C.muted}}>{SK_MONTHS[now.getMonth()]} · {doneCnt}/{dim}</span>
              <Bar pct={Math.round((doneCnt/dim)*100)} color={C.gold} C={C} h={3}/>
              <span style={{fontSize:9,color:C.gold,fontWeight:700,minWidth:28}}>{Math.round((doneCnt/dim)*100)}%</span>
            </summary>
            <div style={{padding:"10px 14px 14px"}}>
              <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
                {SK_DAYS_SHORT.map((d,i)=><div key={i} style={{textAlign:"center",fontSize:8,color:C.muted,fontWeight:700}}>{d}</div>)}
              </div>
              {(()=>{const firstDow=new Date(now.getFullYear(),now.getMonth(),1).getDay();const off=monOffset(firstDow);const cells=[...Array(off).fill(null),...monthDays];const rows=[];for(let i=0;i<cells.length;i+=7)rows.push(cells.slice(i,i+7));
                return rows.map((row,ri)=><div key={ri} style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:3}}>
                  {row.map((day,di)=>{if(!day)return <div key={di}/>;const isDone=!!(h.checks&&h.checks[day]);const isFuture=day>tod;const isToday=day===tod;const dn=new Date(day+"T12:00").getDate();
                    return <div key={di} onClick={()=>!isFuture&&toggleHabitDay(h.id,day)} style={{height:24,borderRadius:6,background:isDone?"#c9a84c":isFuture?"transparent":C.accentLight,border:isToday?`2px solid ${C.gold}`:`1px solid ${isFuture?"transparent":C.border}`,cursor:isFuture?"default":"pointer",opacity:isFuture?0.15:1,display:"flex",alignItems:"center",justifyContent:"center",transition:"background .15s"}}>
                      {isDone?<SvgIcon name="check" size={9} color="#1a1208"/>:<span style={{fontSize:8,color:isFuture?"transparent":C.muted,fontWeight:500}}>{dn}</span>}
                    </div>;})}
                </div>);
              })()}
            </div>
          </details>
        </>}
      </div>;
    })}
  </div>;
}

function Challenges({C}){
  const[challenges,setChallenges]=useStorage("challenges",[]);
  const[text,setText]=useState("");
  const[targetDays,setTargetDays]=useState(7);
  const[which,setWhich]=useState("current");
  const[editing,setEditing]=useState(null);
  const[editText,setEditText]=useState("");
  const[editTarget,setEditTarget]=useState(7);
  const[confetti,setConfetti]=useState(0);
  const tod=todayStr();
  const getWeek=offset=>{const d=new Date();d.setDate(d.getDate()-monOffset(d.getDay())+offset*7);return toISO(d);};
  const currentWeek=getWeek(0),nextWeek=getWeek(1),targetWeek=which==="next"?nextWeek:currentWeek;
  const current=challenges.filter(c=>c.week===currentWeek);
  const next=challenges.filter(c=>c.week===nextWeek);
  const past=challenges.filter(c=>c.week!==currentWeek&&c.week!==nextWeek).sort((a,b)=>b.week.localeCompare(a.week));
  const add=()=>{if(!text.trim())return;setChallenges(c=>[...c,{id:Date.now(),text:text.trim(),week:targetWeek,doneMap:{},target:targetDays}]);setText("");setTargetDays(7);};
  const toggleDay=(id,day)=>{setChallenges(cs=>cs.map(c=>{if(c.id!==id)return c;const dm={...(c.doneMap||{})};dm[day]=!dm[day];return{...c,doneMap:dm};}));setConfetti(x=>x+1);};
  const del=id=>setChallenges(cs=>cs.filter(c=>c.id!==id));
  const saveEdit=id=>{setChallenges(cs=>cs.map(c=>c.id===id?{...c,text:editText,target:editTarget}:c));setEditing(null);};
  const getWeekDays=ws=>Array.from({length:7},(_,i)=>{const d=new Date(ws+"T12:00");d.setDate(d.getDate()+i);return toISO(d);});
  const getChallengeStats=(c,ws)=>{const days=getWeekDays(ws);const done=days.filter(d=>c.doneMap&&c.doneMap[d]).length;const target=c.target||7;return{done,target,pct:Math.round((done/target)*100)};};
  const weekLabel=ws=>{const wn=getWeekNum(ws);const d=new Date(ws+"T12:00");return`Týždeň ${wn} · ${d.getDate()}. ${SK_MONTHS[d.getMonth()].slice(0,3)}.`;};
  const{onDragStart:ods,onDrop:odp}=useDragList(current,arr=>setChallenges(cs=>[...cs.filter(c=>c.week!==currentWeek),...arr]));
  const pastWeeks=[...new Set(past.map(c=>c.week))];

  const ChallengeRow=({c,ws,canToggle,i,arr})=>{
    const{done:doneCnt,target,pct}=getChallengeStats(c,ws||currentWeek);
    const isComplete=doneCnt>=target;
    const doneDays=(getWeekDays(ws||currentWeek)).filter(d=>c.doneMap&&c.doneMap[d]&&d<=tod);
    return editing===c.id?(
      <div style={{padding:12,borderBottom:i<arr.length-1?`1px solid ${C.sepLine}`:"none"}}>
        <div style={{display:"flex",gap:8,marginBottom:8}}>
          <input value={editText} onChange={e=>setEditText(e.target.value)} style={{flex:1,border:`1px solid ${C.border}`,borderRadius:10,padding:"8px 10px",fontSize:13,background:C.card,color:C.text,outline:"none"}}/>
          <button onClick={()=>saveEdit(c.id)} style={{background:"#c9a84c",border:"none",borderRadius:10,padding:"8px 12px",color:"#1a1208",fontWeight:700,cursor:"pointer"}}>✓</button>
          <button onClick={()=>setEditing(null)} style={{background:C.border,border:"none",borderRadius:10,padding:"8px 10px",cursor:"pointer",color:C.muted}}>✕</button>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
          <span style={{fontSize:12,color:C.muted}}>Cieľ:</span>
          {[1,2,3,4,5,6,7].map(n=><button key={n} onClick={()=>setEditTarget(n)} style={{width:28,height:28,borderRadius:7,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:editTarget===n?"#c9a84c":C.card,color:editTarget===n?"#1a1208":C.muted}}>{n}</button>)}
          <span style={{fontSize:12,color:C.muted}}>dní</span>
        </div>
      </div>
    ):(
      <div style={{borderBottom:i<arr.length-1?`1px solid ${C.sepLine}`:"none",background:isComplete?C.accentLight:C.itemBg}}>
        <div style={{display:"flex",alignItems:"center",padding:"10px 14px",gap:8}}>
          {canToggle&&<div style={{color:C.border,userSelect:"none",fontSize:16,cursor:"grab",flexShrink:0}}>⠿</div>}
          <div style={{flex:1,cursor:"pointer",minWidth:0}} onClick={()=>{setEditing(c.id);setEditText(c.text);setEditTarget(c.target||7);}}>
            <div style={{fontSize:13,fontWeight:500,color:isComplete?C.muted:C.text,textDecoration:isComplete?"line-through":"none"}}>{c.text}</div>
          </div>
          <button onClick={()=>del(c.id)} style={{background:"none",border:"none",cursor:"pointer",color:C.border,fontSize:14,flexShrink:0}}>✕</button>
        </div>
        {ws&&(()=>{
          return <div style={{padding:"0 14px 12px"}}>
            <div style={{display:"flex",gap:5,alignItems:"center"}}>
              {Array.from({length:target},(_,idx)=>{
                const filled=idx<doneCnt;
                return <div key={idx}
                  onClick={()=>{if(!canToggle)return;if(filled){const lastDay=doneDays[doneDays.length-1];if(lastDay)toggleDay(c.id,lastDay);}else{const nextDay=getWeekDays(ws).find(d=>d<=tod&&!(c.doneMap&&c.doneMap[d]));if(nextDay)toggleDay(c.id,nextDay);}}}
                  style={{flex:1,height:28,borderRadius:7,background:filled?"#c9a84c":C.accentLight,border:`1.5px solid ${filled?"#c9a84c":C.border}`,cursor:canToggle?"pointer":"default",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .2s"}}>
                  {filled&&<SvgIcon name="check" size={10} color="#1a1208"/>}
                </div>;
              })}
              <span style={{fontSize:11,fontWeight:700,color:isComplete?C.gold:C.muted,marginLeft:4,whiteSpace:"nowrap"}}>{doneCnt}/{target}</span>
            </div>
          </div>;
        })()}
      </div>
    );
  };

  return <div style={{position:"relative"}}>
    <Confetti trigger={confetti}/>
    <div style={{display:"flex",gap:3,marginBottom:14,background:C.accentLight,borderRadius:12,padding:3}}>
      <button onClick={()=>setWhich("current")} style={{flex:1,padding:"8px 6px",borderRadius:9,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:which==="current"?"#c9a84c":"transparent",color:which==="current"?"#1a1208":C.muted}}>Tento týždeň</button>
      <button onClick={()=>setWhich("next")} style={{flex:1,padding:"8px 6px",borderRadius:9,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:which==="next"?"#c9a84c":"transparent",color:which==="next"?"#1a1208":C.muted}}>Budúci týždeň</button>
    </div>
    <div style={{marginBottom:14}}>
      <div style={{display:"flex",gap:8,marginBottom:8}}>
        <input value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} placeholder="Nová výzva..." style={{flex:1,border:`1px solid ${C.border}`,borderRadius:10,padding:"9px 12px",fontSize:13,background:C.card,color:C.text,outline:"none"}}/>
        <button onClick={add} style={{background:"#c9a84c",border:"none",borderRadius:10,padding:"9px 14px",color:"#1a1208",fontWeight:700,fontSize:16,cursor:"pointer"}}>+</button>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
        <span style={{fontSize:11,color:C.muted}}>Cieľ:</span>
        {[1,2,3,4,5,6,7].map(n=><button key={n} onClick={()=>setTargetDays(n)} style={{width:26,height:26,borderRadius:7,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:targetDays===n?"#c9a84c":C.card,color:targetDays===n?"#1a1208":C.muted}}>{n}</button>)}
        <span style={{fontSize:11,color:C.muted}}>dní</span>
      </div>
    </div>
    {which==="current"&&<>
      {current.length===0&&<div style={{textAlign:"center",color:C.muted,fontSize:13,padding:"24px 0",fontStyle:"italic"}}>Výzva čaká na teba. ✦</div>}
      {current.length>0&&<div style={{background:C.card,borderRadius:14,border:`1px solid ${C.border}`,overflow:"hidden",marginBottom:12}}>
        {current.map((c,i)=><div key={c.id} draggable onDragStart={()=>ods(i)} onDragOver={e=>{e.preventDefault();e.currentTarget.style.outline=`2px dashed ${C.gold}`;}} onDragLeave={e=>e.currentTarget.style.outline=""} onDrop={e=>{e.currentTarget.style.outline="";odp(i);}}><ChallengeRow c={c} ws={currentWeek} canToggle={true} i={i} arr={current}/></div>)}
      </div>}
    </>}
    {which==="next"&&<>
      {next.length===0&&<div style={{textAlign:"center",color:C.muted,fontSize:13,padding:"24px 0",fontStyle:"italic"}}>Plánujte ďalší týždeň. ✦</div>}
      {next.length>0&&<div style={{background:C.card,borderRadius:14,border:`1px solid ${C.border}`,overflow:"hidden",marginBottom:12}}>
        {next.map((c,i)=><ChallengeRow key={c.id} c={c} ws={null} canToggle={false} i={i} arr={next}/>)}
      </div>}
    </>}
    {past.length>0&&<details style={{marginTop:4}}>
      <summary style={{fontSize:11,color:C.muted,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
        <span style={{fontSize:10,color:C.gold}}>▸</span> Archív ({past.length})
      </summary>
      <div style={{marginTop:8}}>
        {pastWeeks.map(ws=>{
          const wcs=past.filter(c=>c.week===ws);
          const totalDone=wcs.filter(c=>{const{done,target}=getChallengeStats(c,ws);return done>=target;}).length;
          const avgPct=Math.round(wcs.reduce((s,c)=>{const{pct}=getChallengeStats(c,ws);return s+pct;},0)/wcs.length);
          return <details key={ws} style={{marginBottom:6}}>
            <summary style={{cursor:"pointer",display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:C.itemBg,borderRadius:10,border:`1px solid ${C.border}`}}>
              <span style={{fontSize:10,color:C.gold}}>▸</span>
              <span style={{fontSize:12,color:C.text,flex:1}}>{weekLabel(ws)}</span>
              <span style={{fontSize:11,fontWeight:700,color:avgPct>=80?C.gold:C.muted}}>{totalDone}/{wcs.length} · {avgPct}%</span>
            </summary>
            <div style={{background:C.card,borderRadius:10,border:`1px solid ${C.border}`,overflow:"hidden",marginTop:4,opacity:0.7}}>
              {wcs.map((c,i)=>{const{done,target,pct}=getChallengeStats(c,ws);const complete=done>=target;return <div key={c.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 14px",borderBottom:i<wcs.length-1?`1px solid ${C.sepLine}`:"none"}}>
                <div style={{width:18,height:18,borderRadius:5,background:complete?"#c9a84c":C.border,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{complete&&<SvgIcon name="check" size={9} color="#1a1208"/>}</div>
                <span style={{flex:1,fontSize:12,textDecoration:complete?"line-through":"none",color:complete?C.muted:C.text}}>{c.text}</span>
                <span style={{fontSize:11,fontWeight:700,color:complete?C.gold:C.muted,whiteSpace:"nowrap"}}>{done}/{target}d · {pct}%</span>
              </div>;})}
            </div>
          </details>;
        })}
      </div>
    </details>}
  </div>;
}

function Weight({C}){
  const[entries,setEntries]=useStorage("weight_entries",[]);
  const[cycleLog,setCycleLog]=useStorage("cycle_log",[]);
  const[form,setForm]=useState({date:todayStr(),weight:"",note:""});
  const[showCycleForm,setShowCycleForm]=useState(false);
  const[cycleDate,setCycleDate]=useState(todayStr());
  const addWeight=()=>{if(!form.weight)return;setEntries(e=>[...e.filter(x=>x.date!==form.date),{date:form.date,weight:parseFloat(form.weight),note:form.note}].sort((a,b)=>a.date.localeCompare(b.date)));setForm({date:todayStr(),weight:"",note:""});};
  const addCycle=()=>{setCycleLog(c=>[...c.filter(x=>x.date!==cycleDate),{date:cycleDate}].sort((a,b)=>a.date.localeCompare(b.date)));setShowCycleForm(false);};
  const delEntry=date=>setEntries(e=>e.filter(x=>x.date!==date));
  const delCycle=date=>setCycleLog(c=>c.filter(x=>x.date!==date));
  const last30=Array.from({length:30},(_,i)=>{const d=new Date();d.setDate(d.getDate()-29+i);return toISO(d);});
  const chartEntries=entries.filter(e=>last30.includes(e.date));
  const minW=chartEntries.length?Math.min(...chartEntries.map(e=>e.weight))-1:50;
  const maxW=chartEntries.length?Math.max(...chartEntries.map(e=>e.weight))+1:100;
  const chartH=110,chartW=300;
  const toX=date=>{const idx=last30.indexOf(date);return idx<0?0:(idx/(last30.length-1))*chartW;};
  const toY=w=>chartH-((w-minW)/(maxW-minW))*chartH;
  const firstEntry=entries[0],lastEntry=entries[entries.length-1];
  const diff=firstEntry&&lastEntry&&entries.length>1?(lastEntry.weight-firstEntry.weight).toFixed(1):null;
  const si={border:`1px solid ${C.border}`,borderRadius:10,padding:"8px 10px",fontSize:13,background:C.card,color:C.text,outline:"none"};
  const cycleSet=new Set(cycleLog.map(c=>c.date));
  return <div>
    <div style={{background:C.accentLight,borderRadius:16,padding:14,marginBottom:14}}>
      <div style={{fontSize:9,fontWeight:700,color:C.gold,textTransform:"uppercase",letterSpacing:2,marginBottom:10}}>Zadať hmotnosť</div>
      <div style={{display:"flex",gap:8,marginBottom:8}}><input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} style={{...si,flex:1}}/><input type="number" step="0.1" value={form.weight} onChange={e=>setForm(f=>({...f,weight:e.target.value}))} placeholder="kg" style={{...si,width:70}}/></div>
      <input value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} placeholder="Poznámka" style={{...si,width:"100%",marginBottom:8,boxSizing:"border-box"}}/>
      <button onClick={addWeight} style={{width:"100%",background:"#c9a84c",border:"none",borderRadius:10,padding:"9px",color:"#1a1208",fontWeight:700,fontSize:13,cursor:"pointer"}}>Uložiť</button>
    </div>
    {diff!==null&&<div style={{display:"flex",gap:10,marginBottom:14}}>
      <div style={{flex:1,background:C.accentLight,borderRadius:12,padding:"12px",textAlign:"center"}}><div style={{fontSize:20,fontWeight:700,color:C.gold}}>{diff>0?"+":""}{diff} kg</div><div style={{fontSize:10,color:C.muted}}>celková zmena</div></div>
      {lastEntry&&<div style={{flex:1,background:C.itemBg,borderRadius:12,padding:"12px",textAlign:"center",border:`1px solid ${C.border}`}}><div style={{fontSize:20,fontWeight:700,color:C.accent}}>{lastEntry.weight} kg</div><div style={{fontSize:10,color:C.muted}}>posledný záznam</div></div>}
    </div>}
    {chartEntries.length>1&&<div style={{marginBottom:14}}>
      <div style={{fontSize:10,fontWeight:700,color:C.gold,letterSpacing:1.5,textTransform:"uppercase",marginBottom:8}}>Graf – 30 dní</div>
      <div style={{overflowX:"auto"}}><svg width={chartW} height={chartH+20} style={{display:"block"}}>
        <polyline points={chartEntries.map(e=>`${toX(e.date)},${toY(e.weight)}`).join(" ")} fill="none" stroke="#c9a84c" strokeWidth={1.5} strokeLinecap="round" strokeLinejoin="round"/>
        {chartEntries.map(e=><circle key={e.date} cx={toX(e.date)} cy={toY(e.weight)} r={2.5} fill="#c9a84c"/>)}
        {cycleLog.filter(c=>last30.includes(c.date)).map(c=><g key={c.date}><line x1={toX(c.date)} y1={0} x2={toX(c.date)} y2={chartH} stroke="#c9a84c" strokeWidth={1} strokeDasharray="3,3" opacity="0.5"/><path d={`M${toX(c.date)-4},${chartH+4} Q${toX(c.date)},${chartH+12} ${toX(c.date)+4},${chartH+4}`} fill="#c9a84c" opacity="0.7"/></g>)}
      </svg></div>
    </div>}
    <div style={{marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{display:"flex",alignItems:"center",gap:6}}><SvgIcon name="droplet" size={16} color="#c9a84c" fill="#c9a84c"/><span style={{fontSize:10,fontWeight:700,color:C.gold,letterSpacing:1.5,textTransform:"uppercase"}}>Cyklus</span></div>
        <button onClick={()=>setShowCycleForm(!showCycleForm)} style={{background:C.accentLight,border:`1px solid ${C.border}`,borderRadius:8,padding:"4px 10px",cursor:"pointer",color:C.gold,fontSize:11,fontWeight:600,display:"flex",alignItems:"center",gap:4}}><SvgIcon name="droplet" size={12} color="#c9a84c" fill="#c9a84c"/> Zaznačiť</button>
      </div>
      {showCycleForm&&<div style={{display:"flex",gap:8,marginBottom:10}}><input type="date" value={cycleDate} onChange={e=>setCycleDate(e.target.value)} style={{...si,flex:1}}/><button onClick={addCycle} style={{background:"#c9a84c",border:"none",borderRadius:10,padding:"8px 14px",color:"#1a1208",fontWeight:700,cursor:"pointer"}}>✓</button></div>}
      {cycleLog.length>0&&<div style={{background:C.card,borderRadius:14,border:`1px solid ${C.border}`,overflow:"hidden"}}>
        {cycleLog.slice(-6).reverse().map((c,i,arr)=><div key={c.date} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 14px",borderBottom:i<arr.length-1?`1px solid ${C.sepLine}`:"none"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}><SvgIcon name="droplet" size={14} color="#c9a84c" fill="#c9a84c"/><span style={{fontSize:12,color:C.text}}>{new Date(c.date+"T12:00").toLocaleDateString("sk-SK",{day:"numeric",month:"long",year:"numeric"})}</span></div>
          <button onClick={()=>delCycle(c.date)} style={{background:"none",border:"none",cursor:"pointer",color:C.border,fontSize:13}}>✕</button>
        </div>)}
      </div>}
    </div>
    {entries.length>0&&<div>
      <div style={{fontSize:10,fontWeight:700,color:C.gold,letterSpacing:1.5,textTransform:"uppercase",marginBottom:8}}>História</div>
      <div style={{background:C.card,borderRadius:14,border:`1px solid ${C.border}`,overflow:"hidden"}}>
        {entries.slice(-10).reverse().map((e,i,arr)=><div key={e.date} style={{display:"flex",alignItems:"center",padding:"9px 14px",borderBottom:i<arr.length-1?`1px solid ${C.sepLine}`:"none"}}>
          <span style={{fontSize:11,color:C.muted,minWidth:60}}>{new Date(e.date+"T12:00").toLocaleDateString("sk-SK",{day:"numeric",month:"short"})}</span>
          <span style={{fontSize:13,fontWeight:600,color:C.text,flex:1}}>{e.weight} kg</span>
          {cycleSet.has(e.date)&&<SvgIcon name="droplet" size={12} color="#c9a84c" fill="#c9a84c"/>}
          {e.note&&<span style={{fontSize:10,color:C.muted,marginLeft:8}}>{e.note}</span>}
          <button onClick={()=>delEntry(e.date)} style={{background:"none",border:"none",cursor:"pointer",color:C.border,fontSize:13,marginLeft:8}}>✕</button>
        </div>)}
      </div>
    </div>}
  </div>;
}

function Journal({C}){
  const[entries,setEntries]=useStorage("journal",{});
  const[moodLog]=useStorage("mood_log",{});
  const[moods]=useStorage("mood_settings",DEFAULT_MOODS);
  const[selDate,setSelDate]=useState(todayStr());
  const[text,setText]=useState("");
  const[search,setSearch]=useState("");
  useEffect(()=>{setText(entries[selDate]||"");},[selDate,entries]);
  const save=()=>{if(text.trim())setEntries(e=>({...e,[selDate]:text.trim()}));else setEntries(e=>{const n={...e};delete n[selDate];return n;});};
  const tod=todayStr();
  const allDates=Object.keys(entries).sort((a,b)=>b.localeCompare(a));
  const filtered=allDates.filter(d=>!search||entries[d].toLowerCase().includes(search.toLowerCase()));
  const si={border:`1px solid ${C.border}`,borderRadius:10,padding:"8px 10px",fontSize:13,background:C.card,color:C.text,outline:"none"};
  return <div>
    <div style={{background:C.accentLight,borderRadius:16,padding:14,marginBottom:16}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <div style={{fontSize:9,fontWeight:700,color:C.gold,textTransform:"uppercase",letterSpacing:2}}>Nový záznam</div>
        <input type="date" value={selDate} onChange={e=>{setSelDate(e.target.value);}} style={{...si,width:"auto",marginBottom:0,padding:"4px 8px",fontSize:12}}/>
      </div>
      {/* Mood for this date */}
      {(()=>{const cm=moodLog[selDate];const mood=moods.find(m=>m.id===cm);return mood&&<div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}><div style={{width:10,height:10,borderRadius:"50%",background:"#c9a84c",opacity:mood.opacity}}/><span style={{fontSize:11,color:C.muted}}>{mood.label}</span></div>;})()}
      <textarea value={text} onChange={e=>setText(e.target.value)}
        placeholder="Čo sa dnes stalo? Ako sa cítiš? Čo si si uvedomila..."
        style={{...si,width:"100%",minHeight:120,resize:"vertical",lineHeight:1.7,boxSizing:"border-box",marginBottom:8}}/>
      <button onClick={save} style={{background:"#c9a84c",border:"none",borderRadius:10,padding:"8px 20px",color:"#1a1208",fontWeight:700,fontSize:13,cursor:"pointer"}}>Uložiť</button>
    </div>
    {allDates.length>0&&<>
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Hľadať v zápiskoch..." style={{flex:1,...si,marginBottom:0}}/>
        {search&&<button onClick={()=>setSearch("")} style={{background:C.border,border:"none",borderRadius:10,padding:"8px 12px",cursor:"pointer",color:C.muted,fontSize:12}}>✕</button>}
      </div>
      <div style={{background:C.card,borderRadius:14,border:`1px solid ${C.border}`,overflow:"hidden"}}>
        {filtered.map((date,i)=>{
          const d=new Date(date+"T12:00");
          const mood=moods.find(m=>m.id===moodLog[date]);
          const preview=entries[date].slice(0,80)+(entries[date].length>80?"…":"");
          return <div key={date} onClick={()=>setSelDate(date)} style={{padding:"11px 14px",borderBottom:i<filtered.length-1?`1px solid ${C.sepLine}`:"none",cursor:"pointer",background:selDate===date?C.accentLight:"transparent"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
              <span style={{fontSize:11,fontWeight:700,color:C.gold}}>{d.getDate()}. {SK_MONTHS[d.getMonth()]} {d.getFullYear()}</span>
              <span style={{fontSize:10,color:C.muted}}>{SK_DAYS_LONG[d.getDay()]}</span>
              {mood&&<div style={{width:8,height:8,borderRadius:"50%",background:"#c9a84c",opacity:mood.opacity,marginLeft:"auto",flexShrink:0}}/>}
            </div>
            <div style={{fontSize:12,color:C.muted,lineHeight:1.5}}>{preview}</div>
          </div>;
        })}
      </div>
    </>}
  </div>;
}

function Stats({C,moods}){
  const[tasks]=useStorage("tasks",[]);
  const[habits]=useStorage("habits",[]);
  const[challenges]=useStorage("challenges",[]);
  const[weightEntries]=useStorage("weight_entries",[]);
  const[moodLog]=useStorage("mood_log",{});
  const tod=todayStr(),now=new Date();
  const ws=weekMonday(tod);
  const todayH=habits.filter(h=>habitDueToday(h,tod));
  const doneH=todayH.filter(h=>habitDoneOn(h,tod)).length;
  const doneTasks=tasks.filter(t=>isTaskDoneFn(t,tod)).length;
  const weekC=challenges.filter(c=>c.week===ws);
  const getWeekDays=wstart=>Array.from({length:7},(_,i)=>{const d=new Date(wstart+"T12:00");d.setDate(d.getDate()+i);return toISO(d);});
  const doneWC=weekC.filter(c=>{const done=getWeekDays(ws).filter(d=>c.doneMap&&c.doneMap[d]).length;return done>=(c.target||7);}).length;
  const maxStreak=habits.reduce((m,h)=>Math.max(m,h.streak||0),0);
  const best=habits.find(h=>h.streak===maxStreak);
  const monthStart=new Date(now.getFullYear(),now.getMonth(),1);
  const monthDays=Array.from({length:now.getDate()},(_,i)=>toISO(new Date(now.getFullYear(),now.getMonth(),i+1)));
  let habitDaysTotal=0,habitDaysDone=0;
  habits.forEach(h=>{monthDays.forEach(day=>{habitDaysTotal++;if(h.checks&&h.checks[day])habitDaysDone++;});});
  const habitMonthPct=habitDaysTotal?Math.round((habitDaysDone/habitDaysTotal)*100):0;
  const monthTasks=tasks.filter(t=>t.date&&t.date>=toISO(monthStart)&&t.date<=tod);
  const monthTasksDone=monthTasks.filter(t=>t.done).length;
  const catStats=TASK_CATS.map(tc=>{const ct=tasks.filter(t=>t.colorId===tc.id);return{...tc,total:ct.length,done:ct.filter(t=>t.done||isTaskDoneFn(t,tod)).length};}).filter(c=>c.total>0);
  const monthWeight=weightEntries.filter(e=>e.date>=toISO(monthStart)&&e.date<=tod);
  const firstW=monthWeight[0],lastW=monthWeight[monthWeight.length-1];
  const weightDiff=firstW&&lastW&&monthWeight.length>1?(lastW.weight-firstW.weight).toFixed(1):null;
  // Mood stats this month
  const moodCounts={};moods.forEach(m=>{moodCounts[m.id]=monthDays.filter(d=>moodLog[d]===m.id).length;});
  const topMood=moods.reduce((best,m)=>(moodCounts[m.id]||0)>(moodCounts[best?.id]||0)?m:best,null);
  const SL=({c})=><div style={{fontSize:9,fontWeight:700,color:C.gold,textTransform:"uppercase",letterSpacing:2,marginBottom:10,marginTop:20}}>{c}</div>;
  const StatRow=({label,done,total,color})=><div style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:12,color:C.text}}>{label}</span><span style={{fontSize:12,fontWeight:700,color}}>{done}/{total} · {total?Math.round((done/total)*100):0}%</span></div><Bar pct={total?Math.round((done/total)*100):0} color={color} C={C}/></div>;
  return <div>
    <SL c="Dnes"/>
    <StatRow label="Návyky" done={doneH} total={todayH.length||1} color={C.gold}/>
    <StatRow label="Úlohy" done={doneTasks} total={tasks.length||1} color={C.accent}/>
    <StatRow label="Výzvy" done={doneWC} total={weekC.length||1} color={C.lav}/>
    <div style={{background:C.accentLight,borderRadius:14,padding:14,marginTop:14,border:`1px solid ${C.border}`}}>
      <div style={{fontSize:9,color:C.muted,letterSpacing:1.5,textTransform:"uppercase",marginBottom:4}}>Najdlhší streak</div>
      <div style={{fontSize:28,fontWeight:700,color:C.gold}}>{maxStreak} <span style={{fontSize:14,fontWeight:400}}>týždňov</span></div>
      {best&&<div style={{fontSize:11,color:C.muted,marginTop:2}}>{best.name}</div>}
    </div>
    {catStats.length>0&&<><SL c="Úlohy podľa kategórie"/>
      <div style={{background:C.card,borderRadius:14,border:`1px solid ${C.border}`,overflow:"hidden"}}>
        {catStats.map((tc,i)=><div key={tc.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderBottom:i<catStats.length-1?`1px solid ${C.sepLine}`:"none"}}>
          <CatIcon id={tc.id}/><span style={{fontSize:12,color:C.text,flex:1}}>{tc.label}</span>
          <div style={{display:"flex",alignItems:"center",gap:8,minWidth:100}}><Bar pct={tc.total?Math.round((tc.done/tc.total)*100):0} color={tc.color} C={C}/><span style={{fontSize:11,fontWeight:700,color:tc.color,minWidth:28}}>{Math.round((tc.done/(tc.total||1))*100)}%</span></div>
        </div>)}
      </div>
    </>}
    <SL c={`${SK_MONTHS[now.getMonth()]} ${now.getFullYear()}`}/>
    {habits.length>0&&<div style={{marginBottom:10}}><StatRow label="Návyky" done={habitDaysDone} total={habitDaysTotal||1} color={C.gold}/><div style={{fontSize:10,color:C.muted,marginTop:2}}>{habitMonthPct>=80?"Výborný mesiac.":habitMonthPct>=50?"Dobrý progres.":"Je priestor na zlepšenie."}</div></div>}
    {monthTasks.length>0&&<StatRow label="Úlohy" done={monthTasksDone} total={monthTasks.length} color={C.accent}/>}
    {topMood&&Object.values(moodCounts).some(v=>v>0)&&<div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
      <span style={{fontSize:12,color:C.text}}>Prevažná nálada</span>
      <div style={{width:10,height:10,borderRadius:"50%",background:"#c9a84c",opacity:topMood.opacity}}/><span style={{fontSize:12,fontWeight:700,color:C.gold}}>{topMood.label}</span>
    </div>}
    {weightDiff!==null&&<div style={{background:C.accentLight,borderRadius:14,padding:14,marginTop:4,border:`1px solid ${C.border}`}}><div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}><SvgIcon name="droplet" size={14} color="#c9a84c" fill="#c9a84c"/><div style={{fontSize:9,color:C.muted,letterSpacing:1.5,textTransform:"uppercase"}}>Forma</div></div><div style={{fontSize:22,fontWeight:700,color:C.gold}}>{weightDiff>0?"+":""}{weightDiff} kg</div><div style={{fontSize:10,color:C.muted,marginTop:2}}>{firstW.weight} → {lastW.weight} kg</div></div>}
  </div>;
}

function Nastavenia({C,moods,setMoods}){
  const[tasks]=useStorage("tasks",[]);
  const[habits]=useStorage("habits",[]);
  const[challenges]=useStorage("challenges",[]);
  const[weightEntries]=useStorage("weight_entries",[]);
  const[cycleLog]=useStorage("cycle_log",[]);
  const[journal]=useStorage("journal",{});
  const[moodLog]=useStorage("mood_log",{});
  const[msg,setMsg]=useState("");
  const[editingMood,setEditingMood]=useState(null);
  const[moodName,setMoodName]=useState("");
  const exportData=()=>{const data={tasks,habits,challenges,weightEntries,cycleLog,journal,moodLog,moodSettings:moods,exportedAt:new Date().toISOString()};const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`dashboard-${todayStr()}.json`;a.click();URL.revokeObjectURL(url);setMsg("Záloha stiahnutá ✓");setTimeout(()=>setMsg(""),3000);};
  const importData=e=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{try{const d=JSON.parse(ev.target.result);const keys=[["tasks","tasks"],["habits","habits"],["challenges","challenges"],["weightEntries","weight_entries"],["cycleLog","cycle_log"],["journal","journal"],["moodLog","mood_log"],["moodSettings","mood_settings"]];keys.forEach(([dk,sk])=>{if(d[dk])dbSet(sk,d[dk]).catch(()=>{});});setMsg("Import úspešný — obnovte stránku ✓");}catch{setMsg("Chyba pri importe");}};reader.readAsText(file);};
  return <div>
    {/* Nálady */}
    <div style={{fontSize:9,fontWeight:700,color:C.gold,textTransform:"uppercase",letterSpacing:2,marginBottom:12}}>Nastavenie nálad</div>
    <div style={{background:C.card,borderRadius:14,border:`1px solid ${C.border}`,overflow:"hidden",marginBottom:20}}>
      {moods.map((m,i)=>(
        <div key={m.id} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 14px",borderBottom:i<moods.length-1?`1px solid ${C.sepLine}`:"none"}}>
          <div style={{width:16,height:16,borderRadius:"50%",background:"#c9a84c",opacity:m.opacity,flexShrink:0}}/>
          {editingMood===m.id?(
            <input value={moodName} onChange={e=>setMoodName(e.target.value)} onBlur={()=>{setMoods(ms=>ms.map(x=>x.id===m.id?{...x,label:moodName||x.label}:x));setEditingMood(null);}} autoFocus
              style={{flex:1,border:`1px solid ${C.border}`,borderRadius:8,padding:"4px 8px",fontSize:13,background:C.card,color:C.text,outline:"none"}}/>
          ):(
            <span style={{flex:1,fontSize:13,color:C.text,cursor:"pointer"}} onClick={()=>{setEditingMood(m.id);setMoodName(m.label);}}>{m.label}</span>
          )}
          <span style={{fontSize:10,color:C.muted}}>klepnutím upravíte</span>
        </div>
      ))}
    </div>
    {/* Záloha */}
    <div style={{fontSize:9,fontWeight:700,color:C.gold,textTransform:"uppercase",letterSpacing:2,marginBottom:12}}>Záloha dát</div>
    <div style={{background:C.card,borderRadius:14,border:`1px solid ${C.border}`,overflow:"hidden",marginBottom:16}}>
      <div style={{padding:"14px 16px",borderBottom:`1px solid ${C.sepLine}`}}>
        <div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:4}}>Exportovať dáta</div>
        <div style={{fontSize:11,color:C.muted,marginBottom:10}}>Záloha obsahuje všetky dáta vrátane denníka a nálad.</div>
        <button onClick={exportData} style={{padding:"8px 16px",background:C.accentLight,border:`1px solid ${C.border}`,borderRadius:10,color:C.gold,fontWeight:600,fontSize:13,cursor:"pointer"}}>Stiahnuť zálohu</button>
      </div>
      <div style={{padding:"14px 16px"}}>
        <div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:4}}>Importovať dáta</div>
        <div style={{fontSize:11,color:C.muted,marginBottom:10}}>Obnoví všetky dáta. Existujúce dáta budú prepísané.</div>
        <label style={{padding:"8px 16px",background:C.accentLight,border:`1px solid ${C.border}`,borderRadius:10,color:C.gold,fontWeight:600,fontSize:13,cursor:"pointer",display:"inline-block"}}>Vybrať súbor<input type="file" accept=".json" onChange={importData} style={{display:"none"}}/></label>
      </div>
    </div>
    {msg&&<div style={{background:C.accentLight,borderRadius:10,padding:"10px 14px",fontSize:13,color:C.gold,border:`1px solid ${C.border}`,marginBottom:16}}>{msg}</div>}
    <div style={{background:C.card,borderRadius:14,border:`1px solid ${C.border}`,padding:"14px 16px"}}>
      <div style={{fontSize:13,color:C.text,marginBottom:6}}>Dáta sú uložené v <b>IndexedDB</b> — nezmažú sa pri mazaní histórie.</div>
      <div style={{fontSize:11,color:C.muted}}>Zálohu odporúčame pri zmene zariadenia.</div>
    </div>
  </div>;
}

const TABS=[
  {id:"calendar",icon:"calendar",label:"Kalendár"},
  {id:"todo",icon:"tasks",label:"Úlohy"},
  {id:"habits",icon:"habits",label:"Návyky"},
  {id:"challenges",icon:"challenges",label:"Výzvy"},
  {id:"weight",icon:"weight",label:"Forma"},
  {id:"journal",icon:"journal",label:"Zápisník"},
  {id:"stats",icon:"stats",label:"Štatistiky"},
  {id:"settings",icon:"settings",label:"Nastavenia"},
];

function App(){
  const[dark,setDark]=useTheme();
  const C=useC(dark);
  const[tab,setTab]=useState("calendar");
  const[moods,setMoods]=useStorage("mood_settings",DEFAULT_MOODS);
  const now=new Date();
  const dateLabel=now.toLocaleDateString("sk-SK",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  const nameKey=`${now.getMonth()+1}-${now.getDate()}`;
  const todayName=SK_NAMES[nameKey];
  const quote=getDailyQuote();

  // Monthly summary on 1st of month
  const[showMonthly,setShowMonthly]=useState(()=>{
    const prev=localStorage.getItem("lastSummaryShown");
    const prevMonth=new Date();prevMonth.setDate(0);
    const key=`${prevMonth.getFullYear()}-${prevMonth.getMonth()}`;
    return now.getDate()===1&&prev!==key;
  });
  const[tasks]=useStorage("tasks",[]);
  const[habits]=useStorage("habits",[]);
  const[challenges]=useStorage("challenges",[]);
  const[moodLog]=useStorage("mood_log",{});

  return <div style={{minHeight:"100vh",background:C.bg,fontFamily:"sans-serif",color:C.text,transition:"background .3s,color .3s"}}>
    <SmokeHeader dateLabel={dateLabel} todayName={todayName} quote={quote} dark={dark} setDark={setDark} C={C}/>
    <div style={{maxWidth:600,margin:"-20px auto 0",padding:"0 clamp(8px,3vw,16px) 40px",position:"relative",zIndex:2}}>
      <div style={{background:C.card,borderRadius:24,boxShadow:dark?"0 4px 40px rgba(0,0,0,.4)":"0 4px 40px rgba(100,70,20,.10)",border:`1px solid ${C.border}`,overflow:"hidden"}}>
        {/* Tab bar — ikony */}
        <div style={{display:"flex",background:C.smoke,borderBottom:`1px solid ${C.border}`,overflowX:"auto"}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} title={t.label}
              style={{flex:1,padding:"12px 0",border:"none",background:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",borderBottom:tab===t.id?"2px solid #c9a84c":"2px solid transparent",transition:"border .2s",minWidth:36}}>
              <SvgIcon name={t.icon} size={16} color={tab===t.id?"#c9a84c":C.muted}/>
            </button>
          ))}
        </div>
        {/* Tab label */}
        <div style={{background:C.smoke,borderBottom:`1px solid ${C.border}`,padding:"4px 0 6px",textAlign:"center"}}>
          <span style={{fontSize:9,fontWeight:700,color:C.gold,letterSpacing:2,textTransform:"uppercase"}}>{TABS.find(t=>t.id===tab)?.label}</span>
        </div>
        <div style={{padding:"clamp(14px,4vw,22px) clamp(12px,4vw,18px)"}}>
          {tab==="calendar"&&<><Calendar C={C} moods={moods}/><TodayPanel C={C} moods={moods}/></>}
          {tab==="todo"&&<Todo C={C}/>}
          {tab==="habits"&&<Habits C={C}/>}
          {tab==="challenges"&&<Challenges C={C}/>}
          {tab==="weight"&&<Weight C={C}/>}
          {tab==="journal"&&<Journal C={C}/>}
          {tab==="stats"&&<Stats C={C} moods={moods}/>}
          {tab==="settings"&&<Nastavenia C={C} moods={moods} setMoods={setMoods}/>}
        </div>
      </div>
    </div>
    {showMonthly&&(()=>{
      const prev=new Date();prev.setDate(0);
      localStorage.setItem("lastSummaryShown",`${prev.getFullYear()}-${prev.getMonth()}`);
      return <MonthlySummary month={prev.getMonth()} year={prev.getFullYear()} onClose={()=>setShowMonthly(false)} C={C} tasks={tasks} habits={habits} challenges={challenges} moods={moods} moodLog={moodLog}/>;
    })()}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
