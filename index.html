function useStorage(key, def) {
  const [v, setV] = useState(def);
  const loaded = useRef(false);
  useEffect(() => {
    if (!loaded.current) {
      loaded.current = true;
      try { const s = localStorage.getItem(key); if (s) setV(JSON.parse(s)); } catch {}
    }
  }, [key]);
  useEffect(() => {
    if (loaded.current) { try { localStorage.setItem(key, JSON.stringify(v)); } catch {} }
  }, [key, v]);
  return [v, setV];
}

const getDailyQuote = () => {
  const n = new Date(), s = new Date(n.getFullYear(), 0, 0);
  return STOIC_QUOTES[Math.floor((n - s) / 86400000) % STOIC_QUOTES.length];
};

const toISO = d => d.toISOString().split("T")[0];
const todayStr = () => toISO(new Date());
const monOffset = dow => (dow + 6) % 7;
const habitDueToday = (h, dateStr) => {
  const d = new Date(dateStr + "T12:00"), dow = d.getDay();
  if (h.repeat === "daily") return true;
  if (h.repeat === "weekly") { const c = new Date((h.createdAt || dateStr) + "T12:00"); return Math.floor((d - c) / 86400000) % 7 === 0; }
  if (h.repeat === "custom" && h.days) return h.days.includes(dow);
  return true;
};

function Confetti({ trigger }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!trigger) return;
    const canvas = ref.current; if (!canvas) return;
    const ctx = canvas.getContext("2d");
    canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
    const pieces = Array.from({ length: 24 }, () => ({
      x: canvas.width * 0.3 + Math.random() * canvas.width * 0.4,
      y: canvas.height * 0.2 + Math.random() * canvas.height * 0.3,
      r: 1.5 + Math.random() * 2, dx: (Math.random() - 0.5) * 2, dy: -1 - Math.random() * 2,
      alpha: 1, gravity: 0.05,
      color: ["#c9a84c","#b8965a","#d4b896","#a09070","#e8d8b8","#c4aa80"][Math.floor(Math.random() * 6)]
    }));
    let raf;
    const draw = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height); let alive = false;
      pieces.forEach(p => { p.x += p.dx; p.y += p.dy; p.dy += p.gravity; p.alpha -= 0.02;
        if (p.alpha > 0) { alive = true; ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill(); }
      });
      ctx.globalAlpha = 1;
      if (alive) raf = requestAnimationFrame(draw); else ctx.clearRect(0, 0, canvas.width, canvas.height);
    };
    draw(); return () => cancelAnimationFrame(raf);
  }, [trigger]);
  return React.createElement('canvas', {ref, style:{position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none",borderRadius:"inherit",zIndex:10}});
}

function DayDetail({ date, onClose }) {
  const [tasks, setTasks] = useStorage("tasks", []);
  const [habits, setHabits] = useStorage("habits", []);
  const [challenges, setChallenges] = useStorage("challenges", []);
  const [showAddTask, setShowAddTask] = useState(false);
  const [confetti, setConfetti] = useState(0);
  const d = new Date(date + "T12:00");
  const key = `${d.getMonth()+1}-${d.getDate()}`;
  const label = `${SK_DAYS_LONG[d.getDay()]} ${d.getDate()}. ${SK_MONTHS[d.getMonth()]} ${d.getFullYear()}`;
  const holiday = SK_HOLIDAYS[key] || "";
  const nameDay = SK_NAMES[key] || "";
  const dayTasks = tasks.filter(t => t.date === date);
  const dayHabits = habits.filter(h => habitDueToday(h, date));
  const weekStart = (() => { const dd = new Date(date + "T12:00"); dd.setDate(dd.getDate() - monOffset(dd.getDay())); return toISO(dd); })();
  const dayChallenges = challenges.filter(c => c.week === weekStart);
  const doneAll = dayHabits.filter(h => h.checks && h.checks[date]).length + dayTasks.filter(t => t.done).length + dayChallenges.filter(c => c.done).length;
  const totalAll = dayHabits.length + dayTasks.length + dayChallenges.length;
  const pct = totalAll ? Math.round((doneAll / totalAll) * 100) : 0;
  const pop = () => setConfetti(x => x + 1);
  const toggleHabit = id => { setHabits(hs => hs.map(h => { if (h.id !== id) return h; const checks = { ...(h.checks || {}) }; checks[date] = !checks[date]; let streak = 0, dd = new Date(); while (true) { const k = toISO(dd); if (checks[k]) { streak++; dd.setDate(dd.getDate() - 1); } else break; } return { ...h, checks, streak }; })); pop(); };
  const toggleTask = id => { setTasks(ts => ts.map(t => t.id === id ? { ...t, done:!t.done } : t)); pop(); };
  const toggleChallenge = id => { setChallenges(cs => cs.map(c => c.id === id ? { ...c, done:!c.done } : c)); pop(); };
  const addTask = f => { setTasks(t => [...t, { id:Date.now(), ...f, text:f.text.trim(), done:false, date }]); setShowAddTask(false); };
  return (
    <Modal title={label} onClose={onClose}>
      <div style={{position:"relative"}}>
        <Confetti trigger={confetti}/>
        {(holiday || nameDay) && <div style={{background:C.accentLight,borderRadius:10,padding:"8px 12px",marginBottom:14,fontSize:12,color:C.accent}}>{holiday && <div>Sviatok: <b>{holiday}</b></div>}{nameDay && <div>Meniny: <b style={{color:C.gold}}>{nameDay}</b></div>}</div>}
        {totalAll > 0 && <div style={{marginBottom:18}}><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}><Bar pct={pct} color={C.gold}/><span style={{fontWeight:700,fontSize:14,color:C.gold,minWidth:36}}>{pct}%</span></div><div style={{fontSize:10,color:C.muted}}>{doneAll} z {totalAll} splnených</div></div>}
        {[["Návyky", dayHabits, (h,done) => <div key={h.id} onClick={() => toggleHabit(h.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:12,background:done?C.accentLight:C.bg,marginBottom:5,cursor:"pointer"}}><div style={{width:20,height:20,borderRadius:6,border:`1.5px solid ${done?C.gold:C.border}`,background:done?C.gold:"#faf7f2",display:"flex",alignItems:"center",justifyContent:"center",color:"#faf7f2",fontSize:11,flexShrink:0}}>{done?"✓":""}</div><span style={{fontSize:13,flex:1,color:done?C.muted:C.text,textDecoration:done?"line-through":"none"}}>{h.name}</span></div>],].map(([label, items, render]) => (
          <div key={label} style={{marginBottom:18}}>
            <div style={{fontSize:9,fontWeight:700,color:C.gold,textTransform:"uppercase",letterSpacing:2,marginBottom:8}}>{label}</div>
            {items.length === 0 && <div style={{fontSize:12,color:C.muted}}>Žiadne</div>}
            {items.map(h => render(h, !!(h.checks && h.checks[date])))}
          </div>
        ))}
        <div style={{marginBottom:18}}>
          <div style={{fontSize:9,fontWeight:700,color:C.gold,textTransform:"uppercase",letterSpacing:2,marginBottom:8}}>Úlohy</div>

          {showAddTask ? <TaskForm onSave={addTask} onCancel={() => setShowAddTask(false)}/> : <button onClick={() => setShowAddTask(true)} style={{width:"100%",background:"transparent",border:`1px dashed ${C.border}`,borderRadius:10,padding:"8px",cursor:"pointer",color:C.gold,fontSize:12,fontWeight:600,marginTop:4}}>+ Pridať úlohu</button>}

    </Modal>
  );
}

function Calendar() {
  const now = new Date();
  const [view, setView] = useState({ y:now.getFullYear(), m:now.getMonth() });
  const [sel, setSel] = useState(null);
  const [tasks] = useStorage("tasks", []);
  const [habits] = useStorage("habits", []);
  const firstDow = new Date(view.y, view.m, 1).getDay();
  const offset = monOffset(firstDow);
  const dim = new Date(view.y, view.m + 1, 0).getDate();
  const cells = [...Array(offset).fill(null), ...Array.from({ length:dim }, (_, i) => i + 1)];
  const ds = d => `${view.y}-${String(view.m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  const isToday = d => d === now.getDate() && view.m === now.getMonth() && view.y === now.getFullYear();
  const getTasksForDay = d => tasks.filter(t => t.date === ds(d));
  const hasHabit = d => habits.some(h => habitDueToday(h, ds(d)));
  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <button onClick={() => setView(v => { const d = new Date(v.y, v.m-1, 1); return { y:d.getFullYear(), m:d.getMonth() }; })} style={{background:C.accentLight,border:"none",borderRadius:10,width:34,height:34,cursor:"pointer",fontSize:16,color:C.accent}}>‹</button>
        <span style={{fontWeight:700,fontSize:14,color:C.gold,letterSpacing:1}}>{SK_MONTHS[view.m]} {view.y}</span>
        <button onClick={() => setView(v => { const d = new Date(v.y, v.m+1, 1); return { y:d.getFullYear(), m:d.getMonth() }; })} style={{background:C.accentLight,border:"none",borderRadius:10,width:34,height:34,cursor:"pointer",fontSize:16,color:C.accent}}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
        {SK_DAYS_SHORT.map((d, i) => <div key={i} style={{textAlign:"center",fontSize:9,fontWeight:700,color:i>=5?C.gold:C.muted,padding:"2px 0",letterSpacing:0.5}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
        {cells.map((d, i) => {
          if (!d) return <div key={i}/>;
          const tod = isToday(d), hol = SK_HOLIDAYS[`${view.m+1}-${d}`];
          const dayTasks = getTasksForDay(d), habit = hasHabit(d);
          return (
            <div key={i} onClick={() => setSel(ds(d))} style={{borderRadius:8,padding:"4px 3px 5px",cursor:"pointer",background:tod?C.gold:hol?"#f0e8d4":"transparent",color:tod?"#faf7f2":hol?C.accent:C.text,minHeight:48}}>
              <div style={{textAlign:"center",fontSize:12,fontWeight:tod?700:400,marginBottom:2}}>{d}</div>
              <div style={{display:"flex",flexDirection:"column",gap:1,paddingLeft:2,paddingRight:2}}>
                {dayTasks.slice(0,2).map(t => { const tc = getTC(t.colorId); return <div key={t.id} style={{fontSize:8,background:tod?"rgba(255,255,255,0.25)":tc.bg,color:tod?"#faf7f2":tc.color,borderRadius:3,padding:"1px 3px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",fontWeight:600}}>{t.text}</div>; })}
                {dayTasks.length > 2 && <div style={{fontSize:8,color:tod?"rgba(255,255,255,0.7)":C.muted,paddingLeft:2}}>+{dayTasks.length-2}</div>}
                {habit && dayTasks.length === 0 && <div style={{width:4,height:4,borderRadius:"50%",background:tod?"rgba(255,255,255,0.7)":C.accent,margin:"2px auto 0"}}/>}
              </div>
            </div>
          );
        })}
      </div>
      {sel && <DayDetail date={sel} onClose={() => setSel(null)}/>}
    </div>
  );
}

function Todo() {
  const [tasks, setTasks] = useStorage("tasks", []);
  const [showForm, setShowForm] = useState(false);
  const [editing, setEditing] = useState(null);
  const [confetti, setConfetti] = useState(0);
  const add = f => { setTasks(t => [...t, { id:Date.now(), ...f, text:f.text.trim(), done:false }]); setShowForm(false); };
  const save = (id, f) => { setTasks(ts => ts.map(t => t.id === id ? { ...t, ...f, text:f.text.trim() } : t)); setEditing(null); };
  const toggle = id => { setTasks(ts => ts.map(t => t.id === id ? { ...t, done:!t.done } : t)); setConfetti(x => x+1); };
  const del = id => setTasks(ts => ts.filter(t => t.id !== id));
  const todo = tasks.filter(t => !t.done).sort((a,b) => (a.date||"zzz").localeCompare(b.date||"zzz"));
  const done = tasks.filter(t => t.done);
  return (
    <div style={{position:"relative"}}>
      <Confetti trigger={confetti}/>
      <button onClick={() => setShowForm(!showForm)} style={{width:"100%",background:C.accentLight,border:`1px dashed ${C.border}`,borderRadius:12,padding:"10px",cursor:"pointer",color:C.gold,fontWeight:600,fontSize:13,marginBottom:14,letterSpacing:0.5}}>+ Pridať úlohu</button>
      {showForm && <TaskForm onSave={add} onCancel={() => setShowForm(false)}/>}
      {todo.length===0&&!showForm&&<div style={{textAlign:"center",color:C.muted,fontSize:12,padding:"16px 0",letterSpacing:0.5}}>Žiadne úlohy</div>}
      {todo.map(t => { const tc = getTC(t.colorId);
        return editing === t.id
          ? <TaskForm key={t.id} initial={t} onSave={f => save(t.id,f)} onCancel={() => setEditing(null)}/>
          : <div key={t.id} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"10px 12px",borderRadius:12,background:C.bg,marginBottom:7,borderLeft:`2px solid ${tc.color}`}}>
              <div onClick={() => toggle(t.id)} style={{width:20,height:20,borderRadius:6,border:`1.5px solid ${C.border}`,background:"#faf7f2",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}/>
              <div style={{flex:1,cursor:"pointer"}} onClick={() => setEditing(t.id)}>
                <div style={{fontSize:13,fontWeight:500,color:C.text}}>{t.text}</div>
                {t.date&&<div style={{fontSize:10,color:C.muted}}>{new Date(t.date+"T12:00").toLocaleDateString("sk-SK",{day:"numeric",month:"long"})}{t.timeFrom?` · ${t.timeFrom}`:""}{t.timeTo?` – ${t.timeTo}`:""}</div>}
                {t.note&&<div style={{fontSize:10,color:C.muted}}>{t.note}</div>}
              </div>
              <button onClick={() => del(t.id)} style={{background:"none",border:"none",cursor:"pointer",color:C.border,fontSize:14,padding:0}}>✕</button>
            </div>;
      })}
      {done.length>0&&<details><summary style={{fontSize:11,color:C.muted,cursor:"pointer",marginTop:4,letterSpacing:0.5}}>Hotové ({done.length})</summary>
        {done.map(t=><div key={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 12px",borderRadius:10,opacity:.45,marginBottom:3}}>
          <div onClick={()=>toggle(t.id)} style={{width:20,height:20,borderRadius:6,background:C.gold,display:"flex",alignItems:"center",justifyContent:"center",color:"#faf7f2",fontSize:11,cursor:"pointer",flexShrink:0}}>✓</div>
          <span style={{flex:1,fontSize:12,textDecoration:"line-through",color:C.muted}}>{t.text}</span>
          <button onClick={()=>del(t.id)} style={{background:"none",border:"none",cursor:"pointer",color:C.border,fontSize:14}}>✕</button>
        </div>)}
      </details>}
    </div>
  );
}

  const tod = todayStr();
  const toggleDay = d => setForm(f => ({ ...f, days:f.days.includes(d)?f.days.filter(x=>x!==d):[...f.days,d] }));
  const add = () => { if (!form.name.trim()) return; setHabits(h => [...h, { id:Date.now(), name:form.name.trim(), repeat:form.repeat, days:form.days, checks:{}, streak:0, createdAt:tod }]); setForm({ name:"", repeat:"daily", days:[] }); setShowForm(false); };
  const toggle = id => { setHabits(hs => hs.map(h => { if (h.id!==id) return h; const checks={...(h.checks||{})}; checks[tod]=!checks[tod]; let streak=0,d=new Date(); while(true){const k=toISO(d);if(checks[k]){streak++;d.setDate(d.getDate()-1);}else break;} return {...h,checks,streak}; })); setConfetti(x=>x+1); };
  const saveEdit = id => { setHabits(hs => hs.map(h => h.id===id?{...h,...editForm}:h)); setEditing(null); };
  const del = id => setHabits(h => h.filter(x => x.id!==id));

  const getLast30 = h => Array.from({length:30},(_,i)=>{const d=new Date();d.setDate(d.getDate()-29+i);return{date:toISO(d),done:!!(h.checks&&h.checks[toISO(d)])};});
  return (

      <button onClick={()=>setShowForm(!showForm)} style={{width:"100%",background:C.accentLight,border:`1px dashed ${C.border}`,borderRadius:12,padding:"10px",cursor:"pointer",color:C.gold,fontWeight:600,fontSize:13,marginBottom:14,letterSpacing:0.5}}>+ Pridať návyk</button>
      {showForm&&<div style={{background:C.accentLight,borderRadius:16,padding:14,marginBottom:14}}>
        <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="Názov návyku" style={inputStyle}/>
        <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>{Object.entries(REPEAT_LABELS).map(([k,v])=><button key={k} onClick={()=>setForm(f=>({...f,repeat:k}))} style={{padding:"4px 12px",borderRadius:999,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:form.repeat===k?C.gold:C.card,color:form.repeat===k?"#faf7f2":C.muted,letterSpacing:0.5}}>{v}</button>)}</div>
        {form.repeat==="custom"&&<div style={{display:"flex",gap:5,marginBottom:10,flexWrap:"wrap"}}>{DOW_LABELS.map((d,i)=><button key={i} onClick={()=>toggleDay(i)} style={{width:32,height:32,borderRadius:8,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:form.days.includes(i)?C.gold:C.card,color:form.days.includes(i)?"#faf7f2":C.muted}}>{d}</button>)}</div>}
        <div style={{display:"flex",gap:8}}><button onClick={add} style={{flex:1,background:C.gold,border:"none",borderRadius:10,padding:"9px",color:"#faf7f2",fontWeight:700,fontSize:13,cursor:"pointer"}}>Pridať</button><button onClick={()=>setShowForm(false)} style={{background:C.border,border:"none",borderRadius:10,padding:"9px 14px",cursor:"pointer",color:C.muted,fontWeight:600}}>Zrušiť</button></div>
      </div>}
      {habits.length===0&&<div style={{textAlign:"center",color:C.muted,fontSize:12,padding:"16px 0",letterSpacing:0.5}}>Žiadne návyky</div>}
      {habits.map(h=>{const due=habitDueToday(h,tod),done=!!(h.checks&&h.checks[tod]),last30=getLast30(h),done30=last30.filter(x=>x.done).length;
        return <div key={h.id} style={{padding:"12px 14px",borderRadius:16,background:done?C.accentLight:C.bg,marginBottom:8,opacity:due?1:.5}}>
          {editing===h.id?<div>

            <div style={{display:"flex",gap:8}}><button onClick={()=>saveEdit(h.id)} style={{flex:1,background:C.gold,border:"none",borderRadius:10,padding:"8px",color:"#faf7f2",fontWeight:700,cursor:"pointer"}}>Uložiť</button><button onClick={()=>setEditing(null)} style={{background:C.border,border:"none",borderRadius:10,padding:"8px 12px",cursor:"pointer",color:C.muted,fontWeight:600}}>Zrušiť</button></div>
          </div>:<>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div onClick={()=>due&&toggle(h.id)} style={{width:22,height:22,borderRadius:7,border:`1.5px solid ${done?C.gold:C.border}`,background:done?C.gold:"#faf7f2",display:"flex",alignItems:"center",justifyContent:"center",color:"#faf7f2",fontSize:12,cursor:due?"pointer":"default",flexShrink:0}}>{done?"✓":""}</div>
              <div style={{flex:1,cursor:"pointer"}} onClick={()=>{setEditing(h.id);setEditForm({name:h.name,repeat:h.repeat,days:h.days});}}>

              <button onClick={()=>del(h.id)} style={{background:"none",border:"none",cursor:"pointer",color:C.border,fontSize:14,padding:0}}>✕</button>
            </div>
            <div style={{marginTop:9,marginLeft:32}}>
              <div style={{fontSize:9,color:C.muted,marginBottom:3,letterSpacing:0.5}}>30 dní · {done30}/30</div>
              <div style={{display:"flex",gap:2,flexWrap:"wrap"}}>{last30.map((x,i)=><div key={i} style={{width:13,height:13,borderRadius:3,background:x.done?C.gold:C.border,opacity:x.done?0.85:0.5}}/>)}</div>
            </div>
          </>}
        </div>;
      })}
    </div>
  );
}

function Challenges() {
  const [challenges, setChallenges] = useStorage("challenges", []);
  const [text, setText] = useState("");
  const [which, setWhich] = useState("current");
  const [editing, setEditing] = useState(null);
  const [editText, setEditText] = useState("");
  const [confetti, setConfetti] = useState(0);
  const getWeek = offset => { const d=new Date(); d.setDate(d.getDate()-monOffset(d.getDay())+offset*7); return toISO(d); };
  const currentWeek=getWeek(0), nextWeek=getWeek(1), targetWeek=which==="next"?nextWeek:currentWeek;
  const current=challenges.filter(c=>c.week===currentWeek), next=challenges.filter(c=>c.week===nextWeek);
  const past=challenges.filter(c=>c.week!==currentWeek&&c.week!==nextWeek);
  const pct=current.length?Math.round((current.filter(c=>c.done).length/current.length)*100):0;
  const add=()=>{if(!text.trim())return;setChallenges(c=>[...c,{id:Date.now(),text:text.trim(),week:targetWeek,done:false}]);setText("");};
  const toggle=id=>{setChallenges(cs=>cs.map(c=>c.id===id?{...c,done:!c.done}:c));setConfetti(x=>x+1);};
  const del=id=>setChallenges(cs=>cs.filter(c=>c.id!==id));
  const saveEdit=id=>{setChallenges(cs=>cs.map(c=>c.id===id?{...c,text:editText}:c));setEditing(null);};
  const Row=({c,canToggle})=>editing===c.id
    ?<div style={{display:"flex",gap:8,marginBottom:8}}><input value={editText} onChange={e=>setEditText(e.target.value)} style={{flex:1,border:`1px solid ${C.border}`,borderRadius:10,padding:"8px 10px",fontSize:13,background:"#faf7f2",color:C.text,outline:"none"}}/><button onClick={()=>saveEdit(c.id)} style={{background:C.gold,border:"none",borderRadius:10,padding:"8px 12px",color:"#faf7f2",fontWeight:700,cursor:"pointer"}}>✓</button><button onClick={()=>setEditing(null)} style={{background:C.border,border:"none",borderRadius:10,padding:"8px 10px",cursor:"pointer",color:C.muted}}>✕</button></div>
    :<div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:12,background:c.done?C.lavLight:C.bg,marginBottom:7}}>
      <div onClick={()=>canToggle&&toggle(c.id)} style={{width:20,height:20,borderRadius:6,border:`1.5px solid ${c.done?C.gold:C.border}`,background:c.done?C.gold:"#faf7f2",display:"flex",alignItems:"center",justifyContent:"center",color:"#faf7f2",fontSize:11,cursor:canToggle?"pointer":"default",flexShrink:0,opacity:canToggle?1:0.4}}>{c.done?"✓":""}</div>
      <span style={{flex:1,fontSize:13,textDecoration:c.done?"line-through":"none",color:c.done?C.muted:C.text,cursor:"pointer"}} onClick={()=>{setEditing(c.id);setEditText(c.text);}}>{c.text}</span>
      <button onClick={()=>del(c.id)} style={{background:"none",border:"none",cursor:"pointer",color:C.border,fontSize:14}}>✕</button>
    </div>;
  return (
    <div style={{position:"relative"}}>
      <Confetti trigger={confetti}/>
      <div style={{display:"flex",gap:3,marginBottom:14,background:C.accentLight,borderRadius:12,padding:3}}>
        <button onClick={()=>setWhich("current")} style={{flex:1,padding:"8px 6px",borderRadius:9,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:which==="current"?C.gold:"transparent",color:which==="current"?"#faf7f2":C.muted,letterSpacing:0.5}}>Tento týždeň</button>
        <button onClick={()=>setWhich("next")} style={{flex:1,padding:"8px 6px",borderRadius:9,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:which==="next"?C.gold:"transparent",color:which==="next"?"#faf7f2":C.muted,letterSpacing:0.5}}>Budúci týždeň</button>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        <input value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} placeholder="Nová výzva..." style={{flex:1,border:`1px solid ${C.border}`,borderRadius:10,padding:"9px 12px",fontSize:13,background:"#faf7f2",color:C.text,outline:"none"}}/>
        <button onClick={add} style={{background:C.gold,border:"none",borderRadius:10,padding:"9px 14px",color:"#faf7f2",fontWeight:700,fontSize:16,cursor:"pointer"}}>+</button>
      </div>
      {which==="current"&&<>{current.length>0&&<div style={{marginBottom:14}}><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}><Bar pct={pct} color={C.gold}/><span style={{fontWeight:700,color:C.gold,minWidth:36,fontSize:13}}>{pct}%</span></div></div>}{current.length===0&&<div style={{textAlign:"center",color:C.muted,fontSize:12,padding:"8px 0"}}>Žiadne výzvy</div>}{current.map(c=><Row key={c.id} c={c} canToggle={true}/>)}</>}
      {which==="next"&&<>{next.length===0&&<div style={{textAlign:"center",color:C.muted,fontSize:12,padding:"8px 0"}}>Žiadne plánované výzvy</div>}{next.map(c=><Row key={c.id} c={c} canToggle={false}/>)}</>}
      {past.length>0&&<details style={{marginTop:8}}><summary style={{fontSize:11,color:C.muted,cursor:"pointer",letterSpacing:0.5}}>Minulé ({past.length})</summary>{past.map(c=><div key={c.id} style={{display:"flex",alignItems:"center",gap:8,opacity:.4,marginTop:4,fontSize:12}}><span>{c.done?"✓":"–"}</span><span style={{flex:1,textDecoration:c.done?"line-through":"none"}}>{c.text}</span></div>)}</details>}
    </div>
  );
}

function Weight() {
  const [entries, setEntries] = useStorage("weight_entries", []);
  const [cycleLog, setCycleLog] = useStorage("cycle_log", []);
  const [form, setForm] = useState({ date:todayStr(), weight:"", note:"" });
  const [cycleDate, setCycleDate] = useState(todayStr());
  const [showCycleForm, setShowCycleForm] = useState(false);
  const addWeight=()=>{if(!form.weight)return;setEntries(e=>[...e.filter(x=>x.date!==form.date),{date:form.date,weight:parseFloat(form.weight),note:form.note}].sort((a,b)=>a.date.localeCompare(b.date)));setForm({date:todayStr(),weight:"",note:""}); };
  const addCycle=()=>{setCycleLog(c=>[...c.filter(x=>x.date!==cycleDate),{date:cycleDate}].sort((a,b)=>a.date.localeCompare(b.date)));setShowCycleForm(false);};
  const delEntry=date=>setEntries(e=>e.filter(x=>x.date!==date));
  const delCycle=date=>setCycleLog(c=>c.filter(x=>x.date!==date));
  const last30=Array.from({length:30},(_,i)=>{const d=new Date();d.setDate(d.getDate()-29+i);return toISO(d);});
  const chartEntries=entries.filter(e=>last30.includes(e.date));
  const minW=chartEntries.length?Math.min(...chartEntries.map(e=>e.weight))-1:50;
  const maxW=chartEntries.length?Math.max(...chartEntries.map(e=>e.weight))+1:100;
  const chartH=110,chartW=320;
  const toX=date=>{const idx=last30.indexOf(date);return idx<0?0:(idx/(last30.length-1))*chartW;};
  const toY=w=>chartH-((w-minW)/(maxW-minW))*chartH;
  const firstEntry=entries[0],lastEntry=entries[entries.length-1];
  const diff=firstEntry&&lastEntry&&entries.length>1?(lastEntry.weight-firstEntry.weight).toFixed(1):null;
  const si={border:`1px solid ${C.border}`,borderRadius:10,padding:"8px 10px",fontSize:13,background:"#faf7f2",color:C.text,outline:"none"};
  return (
    <div>
      <div style={{background:C.accentLight,borderRadius:16,padding:14,marginBottom:14}}>
        <div style={{fontSize:9,fontWeight:700,color:C.gold,textTransform:"uppercase",letterSpacing:2,marginBottom:10}}>Zadať hmotnosť</div>
        <div style={{display:"flex",gap:8,marginBottom:8}}><input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} style={{...si,flex:1}}/><input type="number" step="0.1" value={form.weight} onChange={e=>setForm(f=>({...f,weight:e.target.value}))} placeholder="kg" style={{...si,width:70}}/></div>
        <input value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} placeholder="Poznámka" style={{...si,width:"100%",marginBottom:8,boxSizing:"border-box"}}/>
        <button onClick={addWeight} style={{width:"100%",background:C.gold,border:"none",borderRadius:10,padding:"9px",color:"#faf7f2",fontWeight:700,fontSize:13,cursor:"pointer"}}>Uložiť</button>
      </div>
      {diff!==null&&<div style={{display:"flex",gap:10,marginBottom:14}}>
        <div style={{flex:1,background:C.accentLight,borderRadius:12,padding:"12px",textAlign:"center"}}><div style={{fontSize:20,fontWeight:700,color:C.gold}}>{diff>0?"+":""}{diff} kg</div><div style={{fontSize:10,color:C.muted,letterSpacing:0.5}}>celková zmena</div></div>
        {lastEntry&&<div style={{flex:1,background:C.bg,borderRadius:12,padding:"12px",textAlign:"center",border:`1px solid ${C.border}`}}><div style={{fontSize:20,fontWeight:700,color:C.accent}}>{lastEntry.weight} kg</div><div style={{fontSize:10,color:C.muted,letterSpacing:0.5}}>posledný záznam</div></div>}
      </div>}
      {chartEntries.length>1&&<div style={{marginBottom:14}}>
        <div style={{fontSize:10,fontWeight:700,color:C.gold,letterSpacing:1.5,textTransform:"uppercase",marginBottom:8}}>Graf – 30 dní</div>
        <div style={{overflowX:"auto"}}><svg width={chartW} height={chartH+20} style={{display:"block"}}>
          <polyline points={chartEntries.map(e=>`${toX(e.date)},${toY(e.weight)}`).join(" ")} fill="none" stroke={C.gold} strokeWidth={1.5} strokeLinecap="round" strokeLinejoin="round"/>
          {chartEntries.map(e=><circle key={e.date} cx={toX(e.date)} cy={toY(e.weight)} r={2.5} fill={C.gold}/>)}
          {cycleLog.filter(c=>last30.includes(c.date)).map(c=><line key={c.date} x1={toX(c.date)} y1={0} x2={toX(c.date)} y2={chartH} stroke={C.lav} strokeWidth={1} strokeDasharray="4,3" opacity="0.6"/>)}
        </svg></div>
      </div>}
      <div style={{marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style={{fontSize:10,fontWeight:700,color:C.gold,letterSpacing:1.5,textTransform:"uppercase"}}>Cyklus</div>
          <button onClick={()=>setShowCycleForm(!showCycleForm)} style={{background:C.accentLight,border:"none",borderRadius:8,padding:"4px 10px",cursor:"pointer",color:C.accent,fontSize:11,fontWeight:600}}>+ Zaznačiť</button>
        </div>
        {showCycleForm&&<div style={{display:"flex",gap:8,marginBottom:10}}><input type="date" value={cycleDate} onChange={e=>setCycleDate(e.target.value)} style={{...si,flex:1}}/><button onClick={addCycle} style={{background:C.gold,border:"none",borderRadius:10,padding:"8px 14px",color:"#faf7f2",fontWeight:700,cursor:"pointer"}}>✓</button></div>}
        {cycleLog.slice(-5).reverse().map(c=><div key={c.date} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 10px",background:C.accentLight,borderRadius:8,marginBottom:3,fontSize:12}}><span style={{color:C.accent}}>{new Date(c.date+"T12:00").toLocaleDateString("sk-SK",{day:"numeric",month:"long",year:"numeric"})}</span><button onClick={()=>delCycle(c.date)} style={{background:"none",border:"none",cursor:"pointer",color:C.border,fontSize:13}}>✕</button></div>)}
      </div>
      {entries.length>0&&<div>
        <div style={{fontSize:10,fontWeight:700,color:C.gold,letterSpacing:1.5,textTransform:"uppercase",marginBottom:8}}>História</div>
        {entries.slice(-10).reverse().map(e=><div key={e.date} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 10px",background:C.bg,borderRadius:8,marginBottom:3}}><span style={{fontSize:11,color:C.muted}}>{new Date(e.date+"T12:00").toLocaleDateString("sk-SK",{day:"numeric",month:"short"})}</span><span style={{fontSize:13,fontWeight:600,color:C.text}}>{e.weight} kg</span>{e.note&&<span style={{fontSize:10,color:C.muted,flex:1,textAlign:"center",marginLeft:8}}>{e.note}</span>}<button onClick={()=>delEntry(e.date)} style={{background:"none",border:"none",cursor:"pointer",color:C.border,fontSize:13}}>✕</button></div>)}
      </div>}
    </div>
  );
}

function Stats() {
  const [tasks]=useStorage("tasks",[]);
  const [habits]=useStorage("habits",[]);
  const [challenges]=useStorage("challenges",[]);
  const [weightEntries]=useStorage("weight_entries",[]);
  const tod=todayStr(),now=new Date();
  const getWeek=()=>{const d=new Date(),s=new Date(d);s.setDate(d.getDate()-monOffset(d.getDay()));return toISO(s);};
  const todayH=habits.filter(h=>habitDueToday(h,tod));
  const doneH=todayH.filter(h=>h.checks&&h.checks[tod]).length;
  const doneTasks=tasks.filter(t=>t.done).length;
  const weekC=challenges.filter(c=>c.week===getWeek());
  const doneWC=weekC.filter(c=>c.done).length;
  const maxStreak=habits.reduce((m,h)=>Math.max(m,h.streak||0),0);
  const best=habits.find(h=>h.streak===maxStreak);
  const monthStart=new Date(now.getFullYear(),now.getMonth(),1);
  const monthDays=Array.from({length:now.getDate()},(_,i)=>{const d=new Date(now.getFullYear(),now.getMonth(),i+1);return toISO(d);});
  let habitDaysTotal=0,habitDaysDone=0;
  habits.forEach(h=>{monthDays.forEach(day=>{if(habitDueToday(h,day)){habitDaysTotal++;if(h.checks&&h.checks[day])habitDaysDone++;}});});
  const habitMonthPct=habitDaysTotal?Math.round((habitDaysDone/habitDaysTotal)*100):0;
  const monthTasks=tasks.filter(t=>t.date&&t.date>=toISO(monthStart)&&t.date<=tod);
  const monthTasksDone=monthTasks.filter(t=>t.done).length;
  const monthWeeks=[];const cur=new Date(monthStart);cur.setDate(cur.getDate()-monOffset(cur.getDay()));
  while(cur<=now){monthWeeks.push(toISO(new Date(cur)));cur.setDate(cur.getDate()+7);}
  const monthChallenges=challenges.filter(c=>monthWeeks.includes(c.week));
  const monthChallengesDone=monthChallenges.filter(c=>c.done).length;
  const monthWeight=weightEntries.filter(e=>e.date>=toISO(monthStart)&&e.date<=tod);
  const firstW=monthWeight[0],lastW=monthWeight[monthWeight.length-1];
  const weightDiff=firstW&&lastW&&monthWeight.length>1?(lastW.weight-firstW.weight).toFixed(1):null;
  const SLabel=({children})=><div style={{fontSize:9,fontWeight:700,color:C.gold,textTransform:"uppercase",letterSpacing:2,marginBottom:12}}>{children}</div>;
  const StatRow=({label,done,total,color})=>(
    <div style={{marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:12,color:C.text}}>{label}</span><span style={{fontSize:12,fontWeight:700,color}}>{done}/{total} · {total?Math.round((done/total)*100):0}%</span></div>
      <Bar pct={total?Math.round((done/total)*100):0} color={color}/>
    </div>
  );
  return (
    <div>
      <SLabel>Dnes</SLabel>
      <StatRow label="Návyky" done={doneH} total={todayH.length||1} color={C.gold}/>
      <StatRow label="Úlohy" done={doneTasks} total={tasks.length||1} color={C.accent}/>
      <StatRow label="Výzvy" done={doneWC} total={weekC.length||1} color={C.lav}/>
      <div style={{background:C.accentLight,borderRadius:14,padding:14,marginTop:4,marginBottom:24,border:`1px solid ${C.border}`}}>
        <div style={{fontSize:9,color:C.muted,letterSpacing:1.5,textTransform:"uppercase",marginBottom:4}}>Najdlhší streak</div>
        <div style={{fontSize:28,fontWeight:700,color:C.gold}}>{maxStreak} <span style={{fontSize:14,fontWeight:400}}>dní</span></div>
        {best&&<div style={{fontSize:11,color:C.muted,marginTop:2}}>{best.name}</div>}
      </div>
      <SLabel>Zhrnutie – {SK_MONTHS[now.getMonth()]} {now.getFullYear()}</SLabel>
      {habits.length>0&&<div style={{marginBottom:12}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:12,color:C.text}}>Návyky</span><span style={{fontSize:12,fontWeight:700,color:C.gold}}>{habitDaysDone}/{habitDaysTotal} · {habitMonthPct}%</span></div><Bar pct={habitMonthPct} color={C.gold}/><div style={{fontSize:10,color:C.muted,marginTop:4}}>{habitMonthPct>=80?"Výborný mesiac.":habitMonthPct>=50?"Dobrý progres.":"Je priestor na zlepšenie."}</div></div>}
      {monthTasks.length>0&&<div style={{marginBottom:12}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:12,color:C.text}}>Úlohy</span><span style={{fontSize:12,fontWeight:700,color:C.accent}}>{monthTasksDone}/{monthTasks.length} · {Math.round((monthTasksDone/monthTasks.length)*100)}%</span></div><Bar pct={Math.round((monthTasksDone/monthTasks.length)*100)} color={C.accent}/></div>}
      {monthChallenges.length>0&&<div style={{marginBottom:12}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:12,color:C.text}}>Výzvy</span><span style={{fontSize:12,fontWeight:700,color:C.lav}}>{monthChallengesDone}/{monthChallenges.length} · {Math.round((monthChallengesDone/monthChallenges.length)*100)}%</span></div><Bar pct={Math.round((monthChallengesDone/monthChallenges.length)*100)} color={C.lav}/></div>}
      {weightDiff!==null&&<div style={{background:C.accentLight,borderRadius:14,padding:14,marginTop:4,border:`1px solid ${C.border}`}}><div style={{fontSize:9,color:C.muted,letterSpacing:1.5,textTransform:"uppercase",marginBottom:4}}>Forma</div><div style={{fontSize:22,fontWeight:700,color:C.gold}}>{weightDiff>0?"+":""}{weightDiff} kg</div><div style={{fontSize:10,color:C.muted,marginTop:2}}>{firstW.weight} → {lastW.weight} kg</div></div>}
    </div>
  );
}

const TABS = [
  {id:"calendar",  label:"Kalendár"},
  {id:"todo",      label:"Úlohy"},
  {id:"habits",    label:"Návyky"},
  {id:"challenges",label:"Výzvy"},
  {id:"weight",    label:"Forma"},
  {id:"stats",     label:"Štatistiky"},
];

function App() {
  const [tab, setTab] = useState("calendar");
  const now = new Date();
  const dateLabel = now.toLocaleDateString("sk-SK", { weekday:"long", day:"numeric", month:"long", year:"numeric" });
  const nameKey = `${now.getMonth()+1}-${now.getDate()}`;
  const todayName = SK_NAMES[nameKey];
  const quote = getDailyQuote();

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#f0e8d8 0%,#ede4d0 100%)",fontFamily:"sans-serif",color:C.text}}>
      <SmokeHeader dateLabel={dateLabel} todayName={todayName} quote={quote}/>
      <div style={{maxWidth:480,margin:"-20px auto 0",padding:"0 14px 40px",position:"relative",zIndex:2}}>
        <div style={{background:C.card,borderRadius:24,boxShadow:"0 4px 40px rgba(100,70,20,.10)",border:`1px solid ${C.border}`,overflow:"hidden"}}>
          <div style={{display:"flex",background:C.smoke,borderBottom:`1px solid ${C.border}`}}>
            {TABS.map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"13px 2px",border:"none",background:"transparent",cursor:"pointer",fontSize:9,fontWeight:700,color:tab===t.id?C.gold:C.muted,borderBottom:tab===t.id?`2px solid ${C.gold}`:"2px solid transparent",whiteSpace:"nowrap",letterSpacing:0.3,textTransform:"uppercase"}}>
                {t.label}
              </button>
            ))}
          </div>
          <div style={{padding:"22px 18px"}}>
            {tab==="calendar"&&<Calendar/>}
            {tab==="todo"&&<Todo/>}
            {tab==="habits"&&<Habits/>}
            {tab==="challenges"&&<Challenges/>}
            {tab==="weight"&&<Weight/>}
            {tab==="stats"&&<Stats/>}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
